<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LOGIC | Hyper-Portal v12.0</title>
    
    <meta name="theme-color" content="#00ff88">
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00ff88;
            --bg: #050508;
            --card: #0d0d12;
            --text: #e2e8f0;
            --muted: #8892b0;
            --border: rgba(255, 255, 255, 0.05);
        }

        /* Light Mode Variables */
        .light-mode {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }

        /* --- PROGRESS BAR --- */
        #read-progress {
            position: fixed; top: 0; left: 0; height: 4px; background: var(--accent);
            width: 0%; z-index: 2001; box-shadow: 0 0 10px var(--accent);
        }

        /* --- NAV & LOGO --- */
        nav {
            padding: 15px 6%; background: var(--card); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-glyph {
            width: 38px; height: 38px; background: #000; border: 2px solid var(--accent);
            border-radius: 10px; display: grid; place-items: center;
            font-family: 'Space Grotesk'; font-weight: 700; color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }
        .logo-text { font-family: 'Space Grotesk'; font-size: 1.3rem; color: var(--text); }

        .nav-tools { display: flex; gap: 15px; align-items: center; }
        .tool-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; }

        /* --- GRID & CARDS --- */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 6%; }
        #feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }

        .card {
            background: var(--card); border-radius: 20px; overflow: hidden;
            border: 1px solid var(--border); position: relative;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-meta { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--accent); font-weight: 700; text-transform: uppercase; }
        .card-title { font-family: 'Space Grotesk'; font-size: 1.1rem; margin: 10px 0; color: var(--text); }

        /* --- MODAL --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 2000; padding: 20px; overflow-y: auto; }
        .m-content { background: var(--card); max-width: 800px; margin: 20px auto; border-radius: 25px; padding: 30px; position: relative; border: 1px solid var(--border); }
        .m-img { width: 100%; border-radius: 15px; margin-bottom: 20px; }
        
        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .btn-p { background: var(--accent); color: #000; }
        .btn-s { background: #1da1f2; color: #fff; } /* Twitter Color */
        .btn-wa { background: #25d366; color: #fff; } /* WA Color */
        .btn-save { background: #f59e0b; color: #fff; }

        .close { position: absolute; top: 20px; right: 25px; font-size: 2rem; color: var(--text); cursor: pointer; }

        @media (max-width: 600px) { .logo-text { display: none; } }
    </style>
</head>
<body>

    <div id="read-progress"></div>

    <nav>
        <a href="#" class="logo">
            <div class="logo-glyph">N</div>
            <div class="logo-text">NEURAL LOGIC</div>
        </a>
        <div class="nav-tools">
            <button class="tool-btn" onclick="toggleTheme()" title="Ganti Tema">🌓</button>
            <button class="tool-btn" onclick="showSaved()" title="Artikel Tersimpan">🔖</button>
        </div>
    </nav>

    <div class="container">
        <h2 id="view-title" style="margin-bottom: 20px; font-family: 'Space Grotesk';">Berita Terbaru</h2>
        <div id="feed"></div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="m-content" onclick="event.stopPropagation()">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="m-img" class="m-img">
            
            <div class="action-bar">
                <button class="btn btn-p" onclick="speak()">🔊 Baca</button>
                <button class="btn btn-save" onclick="saveArticle()">🔖 Simpan</button>
                <button class="btn btn-wa" onclick="shareWA()">WA</button>
                <button class="btn btn-s" onclick="shareTwitter()">X</button>
            </div>

            <div id="m-readtime" style="font-size: 0.8rem; color: var(--muted); margin-bottom: 10px;"></div>
            <h1 id="m-title" style="font-family: 'Space Grotesk'; margin-bottom: 20px;"></h1>
            <div id="m-body" style="line-height: 1.8; font-size: 1.1rem; color: var(--text);"></div>
        </div>
    </div>

    <script>
        let allArticles = [];
        let savedArticles = JSON.parse(localStorage.getItem('nn_saved')) || [];
        let currentArt = null;

        // --- 1. DARK/LIGHT MODE ---
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }
        if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

        // --- 2. LOAD DATA ---
        async function init() {
            const res = await fetch('data.json');
            allArticles = await res.json();
            renderFeed(allArticles.sort((a,b) => b.id - a.id));
        }

        function renderFeed(data) {
            const feed = document.getElementById('feed');
            feed.innerHTML = data.map(a => {
                const readTime = Math.ceil(a.body.split(' ').length / 200); // Estimasi 200 kata per menit
                return `
                <div class="card" onclick='openModal(${JSON.stringify(a).replace(/'/g, "&apos;")})'>
                    <img src="${a.img}" class="card-img">
                    <div class="card-body">
                        <div class="card-meta">
                            <span>${a.cat}</span>
                            <span>⏱ ${readTime} Menit</span>
                        </div>
                        <h2 class="card-title">${a.title}</h2>
                    </div>
                </div>
            `}).join('');
        }

        // --- 3. MODAL & READING PROGRESS ---
        function openModal(a) {
            currentArt = a;
            document.getElementById('m-img').src = a.img;
            document.getElementById('m-title').innerText = a.title;
            document.getElementById('m-body').innerText = a.body;
            
            const readTime = Math.ceil(a.body.split(' ').length / 200);
            document.getElementById('m-readtime').innerText = `Estimasi waktu baca: ${readTime} menit`;

            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
            window.addEventListener('scroll', updateProgress);
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.body.style.overflow = 'auto';
            window.speechSynthesis.cancel();
            document.getElementById('read-progress').style.width = '0%';
        }

        function updateProgress() {
            const winScroll = document.querySelector('.m-content').scrollTop || document.documentElement.scrollTop;
            const height = document.querySelector('.m-content').scrollHeight - document.querySelector('.m-content').clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById('read-progress').style.width = scrolled + "%";
        }

        // --- 4. AUDIO READER ---
        function speak() {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(currentArt.title + ". " + currentArt.body);
            utter.lang = 'id-ID';
            window.speechSynthesis.speak(utter);
        }

        // --- 5. BOOKMARKS ---
        function saveArticle() {
            if(!savedArticles.some(a => a.id === currentArt.id)) {
                savedArticles.push(currentArt);
                localStorage.setItem('nn_saved', JSON.stringify(savedArticles));
                alert("Artikel disimpan ke Bookmark!");
            } else {
                alert("Artikel sudah ada di Bookmark.");
            }
        }

        function showSaved() {
            const title = document.getElementById('view-title');
            if(title.innerText === "Berita Terbaru") {
                renderFeed(savedArticles);
                title.innerText = "Bookmark Saya";
            } else {
                renderFeed(allArticles);
                title.innerText = "Berita Terbaru";
            }
        }

        // --- 6. SOCIAL SHARE ---
        function shareWA() {
            const url = window.location.href;
            window.open(`https://api.whatsapp.com/send?text=${currentArt.title} - Baca selengkapnya: ${url}`);
        }

        function shareTwitter() {
            const url = window.location.href;
            window.open(`https://twitter.com/intent/tweet?text=${currentArt.title}&url=${url}`);
        }

        init();
    </script>
</body>
</html>
