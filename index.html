<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#08080a">
    <link rel="manifest" href="manifest.json">
    
    <title>NEURAL LOGIC | Platinum IPTEK 2026</title>
    <meta name="description" content="Portal berita IPTEK masa depan dengan 50+ artikel eksklusif.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00ff88;
            --bg-dark: #08080a;
            --card-bg: rgba(18, 18, 23, 0.7);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-dark); 
            background-image: radial-gradient(circle at 50% -20%, #1a3a2a 0%, var(--bg-dark) 80%);
            font-family: 'Inter', sans-serif; 
            color: var(--text-main); 
            min-height: 100vh;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: rgba(8, 8, 10, 0.8); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .brand { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--accent); text-shadow: 0 0 10px rgba(0,255,136,0.5); }

        /* Search Bar */
        .search-box {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 15px; border-radius: 30px; color: white; outline: none; width: 250px;
            transition: 0.3s; font-size: 0.8rem;
        }
        .search-box:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,255,136,0.2); width: 300px; }

        /* Progress Bar */
        .progress-container { position: fixed; top: 60px; left: 0; width: 100%; height: 2px; z-index: 1001; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: 0.1s; }

        /* Layout */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 5%; display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 900px) { 
            .container { grid-template-columns: 2.5fr 1fr; } 
            aside { position: sticky; top: 90px; height: fit-content; }
        }

        /* Glassmorphism Cards */
        .post-card {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.5s ease forwards;
        }
        .post-card:hover { 
            border-color: var(--accent); transform: translateY(-5px) scale(1.01);
            box-shadow: 0 10px 30px rgba(0,255,136,0.1);
        }
        .post-content { padding: 30px; }
        .post-tag { color: var(--accent); font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; }
        .post-title { font-size: 1.4rem; margin: 10px 0; color: #fff; line-height: 1.3; }

        /* Icons & Buttons */
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn { 
            padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; 
            font-weight: 600; font-size: 0.75rem; transition: 0.3s;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* Widgets */
        .widget { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        .widget h3 { font-size: 0.8rem; color: var(--accent); margin-bottom: 15px; text-transform: uppercase; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 2000; padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: #121217; max-width: 800px; margin: 40px auto; padding: 40px; border-radius: 24px; border: 1px solid var(--accent); position: relative; max-height: 85vh; overflow-y: auto; }
        .close { position: absolute; top: 25px; right: 25px; color: #fff; font-size: 2rem; cursor: pointer; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <div class="brand">NEURAL LOGIC</div>
        <input type="text" id="searchInput" class="search-box" placeholder="Cari topik IPTEK..." onkeyup="searchArticles()">
    </nav>

    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>

    <div class="container">
        <main id="article-feed">
            </main>

        <aside>
            <div class="widget">
                <h3>Audio Reader</h3>
                <p style="font-size: 0.75rem; color: var(--text-muted);">Klik judul artikel lalu tekan tombol "Baca Berita" untuk mendengarkan otomatis.</p>
            </div>
            <div class="widget">
                <h3>Bookmarks</h3>
                <div id="saved-list" style="font-size: 0.8rem; color: var(--text-muted);">Belum ada artikel.</div>
            </div>
            <div class="widget" style="background: linear-gradient(135deg, #00ff8822, transparent);">
                <h3>System Status</h3>
                <div style="font-size: 0.75rem; font-family: monospace; color: var(--accent);">
                    [●] DB: 50 Records<br>
                    [●] UI: Glassmorphism<br>
                    [●] Versi: 5.0.0
                </div>
            </div>
        </aside>
    </div>

    <div class="modal" id="articleModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <span id="mTag" class="post-tag"></span>
            <h1 id="mTitle" style="color:var(--accent); margin: 15px 0; font-family: 'Space Grotesk';"></h1>
            <div id="mBody" style="line-height: 1.8; color: #cbd5e1; font-size: 1.1rem; margin-bottom: 25px;"></div>
            
            <div class="action-btns">
                <button class="btn btn-primary" onclick="readAloud()">🔊 Baca Berita</button>
                <button class="btn btn-outline" onclick="stopAudio()">⏹ Berhenti</button>
            </div>
        </div>
    </div>

    <div id="toast-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script>
        let allArticles = [];

        async function fetchArticles() {
            try {
                const response = await fetch('data.json');
                allArticles = await response.json();
                renderFeed(allArticles.sort((a, b) => b.id - a.id));
            } catch (err) {
                document.getElementById('article-feed').innerHTML = "Database tidak ditemukan.";
            }
        }

        function renderFeed(data) {
            const feed = document.getElementById('article-feed');
            feed.innerHTML = data.length ? "" : "<p>Artikel tidak ditemukan.</p>";
            data.forEach(art => {
                const card = document.createElement('article');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-content" onclick='openModal(${JSON.stringify(art).replace(/'/g, "&apos;")})'>
                        <span class="post-tag">${art.cat}</span>
                        <h2 class="post-title">${art.title}</h2>
                        <div class="action-btns">
                            <button class="btn btn-primary" onclick="event.stopPropagation(); saveArt('${art.id}', '${art.title}')">Simpan</button>
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        // --- Fitur Search ---
        function searchArticles() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allArticles.filter(a => 
                a.title.toLowerCase().includes(query) || 
                a.cat.toLowerCase().includes(query)
            );
            renderFeed(filtered);
        }

        // --- Fitur Audio Reader ---
        let speech = new SpeechSynthesisUtterance();
        function readAloud() {
            window.speechSynthesis.cancel(); // Stop any current speech
            const text = document.getElementById('mTitle').innerText + ". " + document.getElementById('mBody').innerText;
            speech.text = text;
            speech.lang = 'id-ID';
            speech.rate = 1;
            window.speechSynthesis.speak(speech);
        }
        function stopAudio() { window.speechSynthesis.cancel(); }

        // --- Modal & Bookmark ---
        function openModal(art) {
            document.getElementById('mTag').innerText = art.cat;
            document.getElementById('mTitle').innerText = art.title;
            document.getElementById('mBody').innerText = art.body;
            document.getElementById('articleModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('articleModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            stopAudio();
        }

        function saveArt(id, title) {
            let saved = JSON.parse(localStorage.getItem('fav_nl')) || [];
            if(!saved.find(x => x.id === id)) {
                saved.push({id, title});
                localStorage.setItem('fav_nl', JSON.stringify(saved));
                renderSaved();
                alert("Tersimpan di Bookmark!");
            }
        }

        function renderSaved() {
            const list = document.getElementById('saved-list');
            let saved = JSON.parse(localStorage.getItem('fav_nl')) || [];
            if(!saved.length) return;
            list.innerHTML = saved.map(i => `<div style="margin-bottom:8px; border-bottom:1px solid #333; padding:5px 0;">${i.title.substring(0,25)}...</div>`).join("");
        }

        window.onscroll = () => {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("progressBar").style.width = (winScroll / height) * 100 + "%";
        };

        fetchArticles();
        renderSaved();
    </script>
</body>
</html>
