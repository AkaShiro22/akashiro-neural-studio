<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#08080a">
    <title>NEURAL LOGIC | Platinum Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00ff88;
            --bg: #08080a;
            --card: #121217;
            --text: #e2e8f0;
            --muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }

        /* Nav */
        nav {
            padding: 15px 5%; background: rgba(8, 8, 10, 0.9); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid #1f2937;
        }
        .logo { font-family: 'Space Grotesk'; font-size: 1.5rem; font-weight: 700; color: var(--accent); }

        /* Main Grid */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 5%; }
        #article-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Card Card Styling */
        .card {
            background: var(--card); border-radius: 16px; overflow: hidden;
            border: 1px solid #1f2937; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 10px 25px rgba(0, 255, 136, 0.15); }
        
        .card-img {
            width: 100%; height: 180px; object-fit: cover;
            transition: 0.5s; filter: brightness(0.8);
        }
        .card:hover .card-img { filter: brightness(1.1); transform: scale(1.05); }

        .card-body { padding: 20px; flex-grow: 1; }
        .card-tag { font-size: 0.65rem; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .card-title { font-family: 'Space Grotesk'; font-size: 1.15rem; margin: 10px 0; color: #fff; line-height: 1.3; }

        /* Modal */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; z-index: 1000; padding: 20px;
        }
        .modal-content { 
            background: var(--card); max-width: 800px; margin: auto; 
            border-radius: 20px; padding: 30px; border: 1px solid var(--accent);
            max-height: 90vh; overflow-y: auto; position: relative;
        }
        .modal-img { width: 100%; border-radius: 12px; margin-bottom: 20px; height: 300px; object-fit: cover; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #fff; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">NEURAL LOGIC</div>
    </nav>

    <div class="container">
        <div id="article-grid">
            <p style="text-align: center; width: 100%; color: var(--accent);">Mengunduh data IPTEK...</p>
        </div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="m-img" class="modal-img">
            <h1 id="m-title" style="margin-bottom: 15px; color: #fff; font-family: 'Space Grotesk';"></h1>
            <p id="m-body" style="line-height: 1.7; color: var(--text); font-size: 1.1rem;"></p>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const grid = document.getElementById('article-grid');
                
                grid.innerHTML = data.map(item => `
                    <div class="card" onclick='openModal(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
                        <img src="${item.img}" class="card-img" loading="lazy">
                        <div class="card-body">
                            <span class="card-tag">${item.cat}</span>
                            <h2 class="card-title">${item.title}</h2>
                            <p style="font-size: 0.8rem; color: var(--muted);">Ketuk untuk membaca...</p>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('article-grid').innerHTML = "Gagal memuat data. Periksa file data.json.";
            }
        }

        function openModal(item) {
            document.getElementById('m-img').src = item.img;
            document.getElementById('m-title').innerText = item.title;
            document.getElementById('m-body').innerText = item.body;
            document.getElementById('modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        loadData();
    </script>
</body>
</html>
