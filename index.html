<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LOGIC | Next-Gen Tech Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00ff88;
            --bg: #08080c;
            --card: #111118;
            --text: #f8fafc;
            --muted: #94a3b8;
            --glass: rgba(17, 17, 24, 0.8);
            --gradient: linear-gradient(135deg, #00ff88 0%, #0072ff 100%);
        }

        .light-mode {
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        /* --- MODERN NAVIGATION --- */
        nav {
            position: sticky; top: 0; z-index: 2000;
            padding: 15px 6%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { 
            display: flex; align-items: center; gap: 12px; text-decoration: none;
            font-family: 'Space Grotesk'; font-weight: 700; color: var(--text);
            letter-spacing: -1px; font-size: 1.4rem;
        }

        .logo-box {
            padding: 5px 10px; background: var(--gradient); color: #000;
            border-radius: 8px; font-size: 1.1rem;
        }

        /* --- PROGRESS BAR --- */
        #scroll-progress {
            position: fixed; top: 0; left: 0; height: 3px;
            background: var(--gradient); z-index: 2100; width: 0%;
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 60px 6% 20px;
            text-align: center;
        }
        .hero h1 { font-family: 'Space Grotesk'; font-size: 3rem; margin-bottom: 10px; }
        .hero p { color: var(--muted); max-width: 600px; margin: 0 auto; }

        /* --- ARTICLE GRID --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 6%; }
        #feed { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 30px; 
        }

        .card {
            background: var(--card);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-img { width: 100%; height: 220px; object-fit: cover; }
        .card-content { padding: 25px; }
        .badge {
            display: inline-block; padding: 4px 12px; border-radius: 50px;
            background: rgba(0, 255, 136, 0.1); color: var(--accent);
            font-size: 0.75rem; font-weight: 700; margin-bottom: 15px;
        }

        /* --- FLOATING ACTIONS --- */
        .fab-container {
            position: fixed; bottom: 30px; right: 30px;
            display: flex; flex-direction: column; gap: 15px; z-index: 3000;
        }
        .fab {
            width: 55px; height: 55px; border-radius: 18px;
            background: var(--card); border: 1px solid var(--accent);
            color: var(--accent); cursor: pointer; font-size: 1.2rem;
            display: grid; place-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .fab:hover { background: var(--accent); color: #000; }

        /* --- MODAL (NEUMORPHIC) --- */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; z-index: 4000; padding: 20px; overflow-y: auto;
        }
        .m-content {
            background: var(--card); max-width: 850px; margin: 40px auto;
            border-radius: 32px; padding: 40px; position: relative;
        }

        .ai-glow {
            padding: 20px; border-radius: 20px;
            background: linear-gradient(90deg, rgba(0,255,136,0.05), rgba(0,114,255,0.05));
            border: 1px solid rgba(0,255,136,0.2); margin-bottom: 30px;
        }
    </style>
</head>
<body class="dark-mode">

<div id="scroll-progress"></div>

<nav>
    <a href="#" class="logo">
        <span class="logo-box">NL</span> NEURAL LOGIC
    </a>
    <div style="display: flex; gap: 10px;">
        <button class="fab" style="width:40px; height:40px;" onclick="toggleTheme()">🌓</button>
    </div>
</nav>

<div class="hero">
    <div class="badge">Edisi April 2026</div>
    <h1>Masa Depan IPTEK</h1>
    <p>Navigasi kecerdasan buatan, eksplorasi galaksi, dan revolusi gadget terbaru setiap hari.</p>
</div>

<div class="container">
    <div id="feed"></div>
</div>

<div class="fab-container">
    <button class="fab" onclick="showSaved()">🔖</button>
    <button class="fab" onclick="window.scrollTo({top:0, behavior:'smooth'})">▲</button>
</div>

<div id="modal" class="modal" onclick="closeModal()">
    <div class="m-content" onclick="event.stopPropagation()">
        <img id="m-img" style="width:100%; border-radius: 20px; margin-bottom: 25px;">
        <div class="ai-glow">
            <h4 style="color: var(--accent); margin-bottom: 8px;">✨ Intelijen Neural:</h4>
            <p id="m-ai" style="font-size: 0.95rem; line-height: 1.6;"></p>
        </div>
        <h1 id="m-title" style="font-family: 'Space Grotesk'; margin-bottom: 20px;"></h1>
        <div id="m-body" style="line-height: 1.9; color: var(--muted); font-size: 1.1rem;"></div>
        
        <div style="margin-top: 30px; display: flex; gap: 10px;">
            <button onclick="speak()" style="padding: 12px 24px; border-radius: 12px; background: var(--accent); border:none; cursor:pointer; font-weight:700;">🔊 Dengar Audio</button>
            <button onclick="shareWA()" style="padding: 12px 24px; border-radius: 12px; background: #25d366; color:white; border:none; cursor:pointer;">WhatsApp</button>
        </div>
    </div>
</div>

<script>
    let allArticles = [];
    let currentArt = null;

    async function init() {
        const res = await fetch('data.json');
        allArticles = await res.json();
        render(allArticles.sort((a,b) => b.id - a.id));
    }

    function render(data) {
        document.getElementById('feed').innerHTML = data.map(a => `
            <div class="card" onclick='openModal(${JSON.stringify(a).replace(/'/g, "&apos;")})'>
                <img src="${a.img}" class="card-img">
                <div class="card-content">
                    <span class="badge">${a.cat}</span>
                    <h2 style="font-family: 'Space Grotesk'; margin-bottom: 10px;">${a.title}</h2>
                    <p style="color: var(--muted); font-size: 0.9rem;">Klik untuk membaca rangkuman AI...</p>
                </div>
            </div>
        `).join('');
    }

    function openModal(a) {
        currentArt = a;
        document.getElementById('m-img').src = a.img;
        document.getElementById('m-title').innerText = a.title;
        document.getElementById('m-body').innerText = a.body;
        document.getElementById('m-ai').innerText = a.body.substring(0, 150) + "... (Ringkasan otomatis oleh Neural Engine)";
        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
        window.speechSynthesis.cancel();
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const theme = document.body.classList.contains('light-mode') ? 'light' : 'dark';
        localStorage.setItem('theme', theme);
    }

    function speak() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(currentArt.title + ". " + currentArt.body);
        msg.lang = 'id-ID';
        window.speechSynthesis.speak(msg);
    }

    function shareWA() {
        const text = encodeURIComponent(`*${currentArt.title}*\n\nBaca di Neural Logic: ${window.location.href}`);
        window.open(`https://api.whatsapp.com/send?text=${text}`, '_blank');
    }

    window.onscroll = () => {
        let winScroll = document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        let scrolled = (winScroll / height) * 100;
        document.getElementById("scroll-progress").style.width = scrolled + "%";
    };

    init();
</script>
</body>
</html>
