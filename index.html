<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LOGIC | Futuristic Tech & AI Prompts 2026</title>
    <meta name="description" content="Neural Logic adalah pusat inovasi teknologi masa depan, tren AI terbaru, dan koleksi prompt AI profesional.">
    <meta name="author" content="Neural Logic Team">
    <meta name="theme-color" content="#050509">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourdomain.com/">
    <meta property="og:title" content="NEURAL LOGIC | Futuristic Tech & AI Prompts">
    <meta property="og:description" content="Pusat inovasi teknologi masa depan dan koleksi prompt AI profesional.">
    <meta property="og:image" content="https://yourdomain.com/social-preview.jpg">
    <meta property="twitter:card" content="summary_large_image">

    <link rel="canonical" href="https://yourdomain.com/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #00ff88;
            --bg: #050509;
            --card: rgba(17, 17, 24, 0.8);
            --text: #f8fafc;
            --muted: #8892b0;
            --gradient: linear-gradient(135deg, var(--accent) 0%, #0072ff 100%);
            --border-glass: 1px solid rgba(255, 255, 255, 0.08);
        }

        body.theme-cyber { --accent: #ff00ff; --gradient: linear-gradient(135deg, #ff00ff 0%, #7000ff 100%); }
        body.theme-ocean { --accent: #00d9ff; --gradient: linear-gradient(135deg, #00d9ff 0%, #0044ff 100%); }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; min-height: 100vh; transition: background 0.4s; }

        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--gradient); width: 0%; z-index: 1001; transition: width 0.2s; }

        nav { position: sticky; top: 0; z-index: 100; padding: 12px 6%; background: rgba(5, 5, 9, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: var(--border-glass); }
        .logo { font-family: 'Space Grotesk'; font-weight: 700; color: var(--text); text-decoration: none; font-size: 1.1rem; display: flex; align-items: center; }
        .logo-box { padding: 4px 10px; background: var(--gradient); color: #000; border-radius: 8px; margin-right: 8px; }

        .theme-switches { display: flex; gap: 15px; padding: 5px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); transition: 0.2s; }
        .dot:hover { transform: scale(1.2); box-shadow: 0 0 10px var(--accent); }

        .tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; padding: 0 6%; flex-wrap: wrap; }
        .tab-btn { background: var(--card); border: var(--border-glass); color: var(--muted); padding: 12px 22px; border-radius: 14px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 5px 15px rgba(0, 255, 136, 0.2); }

        .search-container { padding: 0 6%; margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 16px 20px; border-radius: 18px; background: var(--card); border: var(--border-glass); color: #fff; outline: none; transition: 0.3s; font-size: 1rem; }
        #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }

        #feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 20px 6% 80px; min-height: 400px; }

        .card, .skeleton { background: var(--card); border-radius: 26px; overflow: hidden; border: var(--border-glass); position: relative; }
        .card { opacity: 0; transform: translateY(30px); cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        /* Ditambahkan aspect-ratio untuk performa */
        .card-img { width: 100%; height: 190px; object-fit: cover; background: #111; transition: 0.5s; aspect-ratio: 16/9; }
        .card-content { padding: 22px; }

        .skeleton { height: 350px; }
        .skeleton::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: loading 1.5s infinite; }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .read-time { font-size: 0.7rem; color: var(--muted); float: right; }
        .post-date { font-size: 0.65rem; color: var(--muted); display: block; margin-top: 4px; opacity: 0.8; }
        .bookmark-badge { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 10px; backdrop-filter: blur(5px); z-index: 2; color: gold; font-size: 0.8rem; border: 1px solid rgba(255,215,0,0.3); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; z-index: 1000; padding: 20px; overflow-y: auto; backdrop-filter: blur(15px); }
        .m-content { background: #0f0f16; max-width: 680px; margin: 40px auto; border-radius: 32px; padding: 35px; border: var(--border-glass); position: relative; }

        .btn-group { display: flex; gap: 12px; margin-top: 10px; }
        .primary-btn { background: var(--accent); color:#000; padding:16px; border:none; border-radius:16px; font-weight:700; cursor:pointer; flex: 2; transition: 0.2s; }
        .sec-btn { background: #1e1e26; color:#fff; padding:16px; border:none; border-radius:16px; cursor:pointer; flex: 1; font-weight: 600; }
        .primary-btn:active, .sec-btn:active { transform: scale(0.95); }

        .share-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 10px; margin-top: 30px; padding-top: 25px; border-top: var(--border-glass); }
        .share-item { padding: 12px; border-radius: 14px; border: var(--border-glass); background: #1a1a24; color: #fff; cursor: pointer; font-size: 0.75rem; text-align: center; font-weight: 600; transition: 0.2s; }
        .share-item:hover { border-color: var(--accent); background: rgba(255,255,255,0.05); }

        footer { padding: 60px 6% 40px; border-top: var(--border-glass); text-align: center; color: var(--muted); font-size: 0.8rem; }
        .status-dot { display: inline-block; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; margin-right: 5px; box-shadow: 0 0 8px var(--accent); }

        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 12px 30px; border-radius: 50px; font-weight: 800; display: none; z-index: 2000; box-shadow: 0 10px 30px rgba(0,255,136,0.3); }
    </style>
</head>
<body>

<div id="progress-bar" aria-hidden="true"></div>
<div id="toast" class="toast" role="alert">Action Confirmed!</div>

<nav>
    <a href="/" class="logo" aria-label="Neural Logic Home">
        <span class="logo-box" aria-hidden="true">NL</span>NEURAL LOGIC
    </a>
    <div class="theme-switches">
        <button class="dot" style="background:#00ff88" onclick="setTheme('default')" aria-label="Green Theme"></button>
        <button class="dot" style="background:#ff00ff" onclick="setTheme('cyber')" aria-label="Pink Theme"></button>
        <button class="dot" style="background:#00d9ff" onclick="setTheme('ocean')" aria-label="Blue Theme"></button>
    </div>
</nav>

<div class="tabs" role="tablist">
    <button class="tab-btn active" onclick="filterTab('ALL')" role="tab">All Trends</button>
    <button class="tab-btn" onclick="filterTab('NEURAL TECH')" role="tab">Tech Hub</button>
    <button class="tab-btn" onclick="filterTab('AI PROMPT')" role="tab">AI Library</button>
    <button class="tab-btn" onclick="filterTab('BOOKMARK')" style="color: var(--accent)" role="tab">★ Favorites</button>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search neural database..." aria-label="Search articles">
</div>

<main id="feed"></main>

<div id="modal" class="modal" aria-modal="true" role="dialog">
    <div class="m-content">
        <img id="m-img" src="" alt="Cover" width="600" height="320" style="width:100%; border-radius: 22px; margin-bottom: 25px; object-fit: cover; max-height: 320px;">
        <h2 id="m-title" style="color: var(--accent); font-family: 'Space Grotesk'; margin-bottom: 15px; font-size: 1.8rem;"></h2>
        <p id="m-body" style="color: var(--text); opacity: 0.95; line-height: 1.8; margin-bottom: 30px; font-size: 1.1rem; white-space: pre-wrap;"></p>
        <div class="btn-group">
            <button id="actionBtn" class="primary-btn">⚡ Action</button>
            <button id="saveBtn" class="sec-btn">☆ Save</button>
            <button onclick="closeModal()" class="sec-btn">Close</button>
        </div>
        <div class="share-grid">
            <button class="share-item" onclick="shareTo('whatsapp')">WhatsApp</button>
            <button class="share-item" onclick="shareTo('facebook')">Facebook</button>
            <button class="share-item" onclick="shareTo('x')">X / Twitter</button>
            <button class="share-item" onclick="shareTo('native')">Copy Link</button>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 NEURAL LOGIC. All Rights Reserved.</p>
    <p style="margin-top: 10px; color: var(--accent); font-weight: 600; letter-spacing: 1px;">
        <span class="status-dot"></span> SYSTEM STATUS: OPERATIONAL
    </p>
</footer>

<script>
    let allData = [];
    let currentFilter = 'ALL';
    let bookmarks = JSON.parse(localStorage.getItem('nl_bookmarks')) || [];

    function showSkeletons() {
        const feed = document.getElementById('feed');
        feed.innerHTML = Array(6).fill('<div class="skeleton"></div>').join('');
    }

    async function init() {
        showSkeletons();
        try {
            const res = await fetch('data.json');
            const rawData = await res.json();
            allData = [...rawData].reverse();
            renderFeed(allData);
        } catch (e) {
            document.getElementById('feed').innerHTML = "<p style='text-align:center; color:var(--muted); grid-column:1/-1;'>Failed to sync with neural database.</p>";
        }
    }

    function getReadTime(text) {
        return Math.ceil(text.trim().split(/\s+/).length / 225);
    }

    function renderFeed(data) {
        const feed = document.getElementById('feed');
        if(data.length === 0) {
            feed.innerHTML = "<p style='grid-column:1/-1; text-align:center; padding:50px; color:var(--muted)'>No neural data found in this sector.</p>";
            return;
        }

        feed.innerHTML = data.map((a, index) => {
            const isSaved = bookmarks.includes(a.id);
            const dateStr = a.date ? new Date(a.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : "Recently Updated";

            // OPTIMASI: fetchpriority tinggi untuk gambar pertama, lazy untuk sisanya
            const priority = index === 0 ? 'fetchpriority="high"' : 'loading="lazy"';

            return `
            <article class="card" onclick="openModalById(${a.id})" aria-label="${a.title}">
                ${isSaved ? '<div class="bookmark-badge">★ Saved</div>' : ''}
                <img src="${a.img}" alt="${a.title}" ${priority} width="400" height="225" class="card-img">
                <div class="card-content">
                    <span class="read-time">⏲️ ${getReadTime(a.body)} min</span>
                    <small style="color:var(--accent); font-weight:700; text-transform:uppercase; font-size:0.7rem;">${a.cat}</small>
                    <time class="post-date">📅 ${dateStr}</time>
                    <h3 style="font-size:1.15rem; margin-top:8px; font-family:'Space Grotesk'; line-height:1.4;">${a.title}</h3>
                </div>
            </article>
        `}).join('');
        observeCards();
    }

    function observeCards() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.05 }); // Threshold lebih rendah untuk performa scroll
        document.querySelectorAll('.card').forEach(c => observer.observe(c));
    }

    function filterTab(cat) {
        currentFilter = cat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(event) event.target.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        let filtered = (currentFilter === 'BOOKMARK') ? allData.filter(a => bookmarks.includes(a.id)) :
                       (currentFilter !== 'ALL' ? allData.filter(a => a.cat === currentFilter) : allData);
        renderFeed(filtered.filter(a => a.title.toLowerCase().includes(term) || a.body.toLowerCase().includes(term)));
    }

    document.getElementById('searchInput').addEventListener('input', applyFilters);

    function openModalById(id) {
        const item = allData.find(x => x.id === id);
        if(!item) return;
        document.getElementById('m-img').src = item.img;
        document.getElementById('m-title').innerText = item.title;
        document.getElementById('m-body').innerText = item.body;

        const actionBtn = document.getElementById('actionBtn');
        if(item.cat === "AI PROMPT") {
            actionBtn.innerHTML = "📋 Copy Prompt";
            actionBtn.onclick = () => { navigator.clipboard.writeText(item.body); showToast("Prompt Copied!"); };
        } else {
            actionBtn.innerHTML = "🔊 Speak Article";
            actionBtn.onclick = () => speak(item.title, item.body);
        }

        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = bookmarks.includes(item.id) ? "★ Saved" : "☆ Save";
        saveBtn.onclick = () => toggleBookmark(item.id);

        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function toggleBookmark(id) {
        if(bookmarks.includes(id)) bookmarks = bookmarks.filter(b => b !== id);
        else bookmarks.push(id);
        localStorage.setItem('nl_bookmarks', JSON.stringify(bookmarks));
        applyFilters();
        closeModal();
    }

    function setTheme(t) {
        document.body.className = (t === 'default' ? '' : 'theme-' + t);
        showToast("Neural Interface: " + t.toUpperCase());
    }

    function speak(t, b) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(`${t}. ${b}`);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function shareTo(p) {
        const u = encodeURIComponent(window.location.href), t = encodeURIComponent(document.getElementById('m-title').innerText);
        const l = { whatsapp: `https://api.whatsapp.com/send?text=${t}%20${u}`, facebook: `https://www.facebook.com/sharer/sharer.php?u=${u}`, x: `https://twitter.com/intent/tweet?text=${t}&url=${u}` };
        if(p === 'native') { navigator.clipboard.writeText(window.location.href); showToast("Link Copied!"); return; }
        window.open(l[p], '_blank');
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
        window.speechSynthesis.cancel();
    }

    window.onclick = (e) => { if (e.target.id === 'modal') closeModal(); };
    window.addEventListener('scroll', () => {
        const s = document.documentElement.scrollTop, h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progress-bar").style.width = (s / h) * 100 + "%";
    });

    init();
</script>
</body>
</html>
