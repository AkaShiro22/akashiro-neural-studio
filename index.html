<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LOGIC | Portal IPTEK 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff88; --bg: #050508; --card: #0d0d12; --text: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- LOGO VEKTOR MODERN --- */
        nav {
            padding: 15px 6%; background: rgba(5, 5, 8, 0.9); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0, 255, 136, 0.15);
        }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-glyph {
            width: 42px; height: 42px; background: #000; border: 2px solid var(--accent);
            border-radius: 12px; display: grid; place-items: center;
            font-family: 'Space Grotesk'; font-weight: 700; color: var(--accent); font-size: 1.6rem;
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.4);
        }
        .logo-text { font-family: 'Space Grotesk'; font-size: 1.5rem; color: #fff; letter-spacing: 0.5px; }

        /* --- GRID & CARDS --- */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 6%; }
        #feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 35px; }

        .card {
            background: var(--card); border-radius: 24px; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04); transition: 0.4s;
            cursor: pointer; position: relative;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 25px; }
        .card-tag { font-size: 0.7rem; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .card-title { font-family: 'Space Grotesk'; font-size: 1.3rem; color: #fff; margin: 12px 0; line-height: 1.3; }

        /* --- MODAL & AUDIO READER --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .m-box { background: var(--card); max-width: 850px; width: 100%; border-radius: 30px; padding: 40px; position: relative; max-height: 90vh; overflow-y: auto; border: 1px solid rgba(0, 255, 136, 0.3); }
        .audio-controls { display: flex; gap: 12px; margin-bottom: 30px; background: rgba(0,255,136,0.08); padding: 15px; border-radius: 15px; }
        .btn-play { background: var(--accent); color: #000; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-stop { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 12px 24px; border-radius: 12px; cursor: pointer; }
        .close-btn { position: absolute; top: 25px; right: 30px; font-size: 2rem; color: #fff; cursor: pointer; }

        @media (max-width: 768px) { .logo-text { display: none; } .m-box { padding: 20px; } }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">
            <div class="logo-glyph">N</div>
            <div class="logo-text">NEURAL LOGIC</div>
        </a>
        <div style="font-size: 0.75rem; color: var(--accent); font-family: monospace;">STATUS: v11.0 ONLINE</div>
    </nav>

    <div class="container">
        <div id="feed"></div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="m-box" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="audio-controls">
                <button class="btn-play" onclick="playAudio()">🔊 Baca Berita</button>
                <button class="btn-stop" onclick="stopAudio()">⏹ Berhenti</button>
            </div>
            <img id="m-img" style="width: 100%; border-radius: 20px; margin-bottom: 25px;">
            <h1 id="m-title" style="font-family: 'Space Grotesk'; color: #fff; font-size: 2.2rem; margin-bottom: 20px;"></h1>
            <p id="m-body" style="font-size: 1.2rem; color: #cbd5e1; line-height: 1.8;"></p>
        </div>
    </div>

    <script>
        let synth = window.speechSynthesis;
        let utter = null;

        async function loadArticles() {
            const res = await fetch('data.json');
            const data = await res.json();
            // Tampilkan yang terbaru (ID tertinggi) dulu
            data.sort((a, b) => b.id - a.id);
            
            document.getElementById('feed').innerHTML = data.map(art => `
                <div class="card" onclick='openModal(${JSON.stringify(art).replace(/'/g, "&apos;")})'>
                    <img src="${art.img}" class="card-img" loading="lazy">
                    <div class="card-content">
                        <span class="card-tag">${art.cat}</span>
                        <h2 class="card-title">${art.title}</h2>
                    </div>
                </div>
            `).join('');
        }

        function openModal(art) {
            document.getElementById('m-img').src = art.img;
            document.getElementById('m-title').innerText = art.title;
            document.getElementById('m-body').innerText = art.body;
            document.getElementById('modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.body.style.overflow = 'auto';
            stopAudio();
        }

        function playAudio() {
            stopAudio();
            const text = document.getElementById('m-title').innerText + ". " + document.getElementById('m-body').innerText;
            utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'id-ID';
            utter.rate = 1.0;
            synth.speak(utter);
        }

        function stopAudio() {
            synth.cancel();
        }

        loadArticles();
    </script>
</body>
</html>
