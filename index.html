<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LOGIC | Premium Tech Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00ff88;
            --bg: #0b0b0f;
            --card: #16161d;
            --text-p: #94a3b8;
            --text-h: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-p); font-family: 'Inter', sans-serif; line-height: 1.6; }

        /* Navigation */
        nav {
            padding: 18px 6%; background: rgba(11, 11, 15, 0.85); backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-family: 'Space Grotesk'; font-size: 1.6rem; font-weight: 700; color: var(--accent); letter-spacing: -1px; }

        /* Container & Grid */
        .container { max-width: 1300px; margin: 40px auto; padding: 0 6%; }
        #article-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 35px;
        }

        /* Card Design */
        .card {
            background: var(--card); border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03); transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer; position: relative;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(0, 255, 136, 0.1); }
        
        .card-img-wrapper { width: 100%; height: 210px; overflow: hidden; position: relative; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .card:hover .card-img { transform: scale(1.1); filter: brightness(1.1); }

        .card-body { padding: 25px; }
        .card-tag { font-size: 0.7rem; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; display: block; }
        .card-title { font-family: 'Space Grotesk'; font-size: 1.3rem; color: var(--text-h); line-height: 1.3; margin-bottom: 12px; }
        .card-excerpt { font-size: 0.9rem; color: var(--text-p); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        /* Modal Overlay */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; z-index: 2000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { 
            background: var(--card); max-width: 850px; width: 100%;
            border-radius: 24px; padding: 0; border: 1px solid rgba(0, 255, 136, 0.2);
            max-height: 90vh; overflow-y: auto; position: relative; animation: modalIn 0.4s ease;
        }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .modal-header-img { width: 100%; height: 350px; object-fit: cover; }
        .modal-body { padding: 40px; }
        .close-btn { position: absolute; top: 20px; right: 25px; background: rgba(0,0,0,0.5); color: white; width: 40px; height: 40px; border-radius: 50%; display: grid; place-items: center; cursor: pointer; font-size: 1.5rem; z-index: 10; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">NEURAL LOGIC</div>
    </nav>

    <div class="container">
        <div id="article-grid"></div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closeModal()">&times;</div>
            <img id="m-img" class="modal-header-img">
            <div class="modal-body">
                <span id="m-tag" class="card-tag"></span>
                <h1 id="m-title" style="margin: 15px 0; color: white; font-family: 'Space Grotesk'; font-size: 2.2rem;"></h1>
                <p id="m-body" style="font-size: 1.1rem; color: #cbd5e1;"></p>
            </div>
        </div>
    </div>

    <script>
        async function init() {
            try {
                const res = await fetch('data.json');
                const data = await res.json();
                const grid = document.getElementById('article-grid');
                
                grid.innerHTML = data.map(item => `
                    <div class="card" onclick='openModal(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
                        <div class="card-img-wrapper">
                            <img src="${item.img}" class="card-img" alt="Visual" loading="lazy">
                        </div>
                        <div class="card-body">
                            <span class="card-tag">${item.cat}</span>
                            <h2 class="card-title">${item.title}</h2>
                            <p class="card-excerpt">${item.body}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Gagal memuat database IPTEK");
            }
        }

        function openModal(item) {
            document.getElementById('m-img').src = item.img;
            document.getElementById('m-tag').innerText = item.cat;
            document.getElementById('m-title').innerText = item.title;
            document.getElementById('m-body').innerText = item.body;
            document.getElementById('modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        init();
    </script>
</body>
</html>
