<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#08080a">
    <link rel="manifest" href="manifest.json">
    
    <title>NEURAL LOGIC | Portal IPTEK 2026</title>
    <meta name="description" content="NEURAL LOGIC: Portal berita IPTEK terdepan tahun 2026. Eksplorasi Neuroscience, Quantum Computing, dan Teknologi Luar Angkasa.">
    <meta name="keywords" content="IPTEK, Teknologi 2026, Neuroscience, Quantum, Berita Sains, Neural Logic">
    <meta property="og:title" content="NEURAL LOGIC | Masa Depan Teknologi">
    <meta property="og:description" content="Baca 50+ artikel eksklusif mengenai perkembangan teknologi terbaru dunia.">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/2103/2103633.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00ff88;
            --bg-dark: #08080a;
            --card-bg: #121217;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-dark); font-family: 'Inter', sans-serif; color: var(--text-main); overflow-x: hidden; }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: rgba(8, 8, 10, 0.95); backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #1f2937;
        }
        .brand { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--accent); letter-spacing: 2px; }

        /* Progress Bar */
        .progress-container { position: fixed; top: 60px; left: 0; width: 100%; height: 3px; z-index: 1001; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; box-shadow: 0 0 15px var(--accent); transition: 0.2s; }

        /* Layout */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 5%; display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 900px) { .container { grid-template-columns: 2.5fr 1fr; } }

        /* Article Cards */
        .post-card {
            background: var(--card-bg); border-radius: 16px; border: 1px solid #1f2937;
            margin-bottom: 20px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer;
        }
        .post-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .post-content { padding: 25px; }
        .post-title { font-size: 1.3rem; margin: 10px 0; color: #fff; line-height: 1.4; }
        .post-tag { color: var(--accent); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }

        /* Buttons */
        .btn-save { background: var(--accent); color: #000; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.75rem; }

        /* Sidebar Widgets */
        .widget { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid #1f2937; margin-bottom: 20px; }
        .widget h3 { font-size: 0.8rem; color: var(--accent); margin-bottom: 15px; text-transform: uppercase; }
        .saved-item { font-size: 0.85rem; padding: 10px 0; border-bottom: 1px solid #1f2937; display: flex; justify-content: space-between; }

        /* Toast Notifications */
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: #1a1a20; color: white; padding: 15px 20px; border-radius: 12px; border-left: 4px solid var(--accent); box-shadow: 0 10px 40px rgba(0,0,0,0.6); animation: slideIn 0.4s ease-out forwards; }
        @keyframes slideIn { from { transform: translateX(110%); } to { transform: translateX(0); } }
        .fade-out { animation: fadeOut 0.5s forwards; }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(20px); } }

        /* Modal Content */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 2000; padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: #121217; max-width: 800px; margin: 40px auto; padding: 40px; border-radius: 24px; border: 1px solid var(--accent); position: relative; max-height: 85vh; overflow-y: auto; }
        .close { position: absolute; top: 25px; right: 25px; color: #fff; font-size: 2rem; cursor: pointer; }
        .comment-input { width: 100%; background: #08080a; border: 1px solid #334155; border-radius: 12px; color: white; padding: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <nav>
        <div class="brand">NEURAL LOGIC</div>
        <div id="offline-tag" style="display:none; font-size: 0.6rem; background: #ff4444; color: white; padding: 2px 8px; border-radius: 10px;">OFFLINE</div>
    </nav>

    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>

    <div class="container">
        <main id="article-feed">
            <p style="text-align: center; color: var(--accent);">Memuat data sinkronisasi...</p>
        </main>

        <aside>
            <div class="widget">
                <h3>Bookmark</h3>
                <div id="saved-list" style="color: var(--text-muted); font-size: 0.8rem;">Belum ada artikel.</div>
            </div>
            <div class="widget">
                <h3>System Health</h3>
                <div style="font-size: 0.8rem; font-family: monospace; color: #00ff00;">
                    > Node Status: Active<br>
                    > Database: 50 Records<br>
                    > Version: 4.6.0-SEO
                </div>
            </div>
        </aside>
    </div>

    <div class="modal" id="articleModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <span id="mTag" class="post-tag"></span>
            <h1 id="mTitle" style="color:var(--accent); margin: 15px 0; font-family: 'Space Grotesk';"></h1>
            <div id="mBody" style="line-height: 1.8; color: #cbd5e1;"></div>
            
            <div style="margin-top: 30px; border-top: 1px solid #1f2937; padding-top: 20px;">
                <h4 style="margin-bottom:15px;">Diskusi Lokal</h4>
                <div id="comments-display"></div>
                <input type="text" id="commentInput" class="comment-input" placeholder="Tambahkan pemikiran Anda...">
                <button class="btn-save" style="margin-top: 10px;" onclick="addComment()">Kirim</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        // CMS System: Load from data.json
        async function fetchArticles() {
            try {
                const response = await fetch('data.json');
                const articles = await response.json();
                renderFeed(articles);
            } catch (err) {
                document.getElementById('article-feed').innerHTML = "Gagal memuat data. Pastikan data.json tersedia.";
            }
        }

        function renderFeed(articles) {
            const feed = document.getElementById('article-feed');
            feed.innerHTML = "";
            articles.forEach(art => {
                const card = document.createElement('article');
                card.className = 'post-card';
                card.onclick = () => openModal(art);
                card.innerHTML = `
                    <div class="post-content">
                        <span class="post-tag">${art.cat}</span>
                        <h2 class="post-title">${art.title}</h2>
                        <button class="btn-save" onclick="event.stopPropagation(); saveArticle('${art.id}', '${art.title}')">Simpan</button>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        // Notification System
        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `🔔 &nbsp; ${msg}`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('fade-out'); setTimeout(() => toast.remove(), 500); }, 4000);
        }

        // Bookmark System
        function saveArticle(id, title) {
            let saved = JSON.parse(localStorage.getItem('saved_nl')) || [];
            if(!saved.find(x => x.id === id)) {
                saved.push({id, title});
                localStorage.setItem('saved_nl', JSON.stringify(saved));
                renderSaved();
                showToast("Berhasil disimpan!");
            } else {
                showToast("Sudah ada di daftar.");
            }
        }

        function renderSaved() {
            const list = document.getElementById('saved-list');
            let saved = JSON.parse(localStorage.getItem('saved_nl')) || [];
            if(saved.length === 0) return;
            list.innerHTML = saved.map(item => `
                <div class="saved-item">
                    <span>${item.title.substring(0, 20)}...</span>
                    <span style="color:#ff4444; cursor:pointer;" onclick="removeSaved('${item.id}')">✕</span>
                </div>
            `).join("");
        }

        function removeSaved(id) {
            let saved = JSON.parse(localStorage.getItem('saved_nl')) || [];
            localStorage.setItem('saved_nl', JSON.stringify(saved.filter(i => i.id !== id)));
            renderSaved();
            showToast("Bookmark dihapus.");
        }

        // Modal Logic
        let currentId = null;
        function openModal(art) {
            currentId = art.id;
            document.getElementById('mTag').innerText = art.cat;
            document.getElementById('mTitle').innerText = art.title;
            document.getElementById('mBody').innerText = art.body;
            document.getElementById('articleModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
            loadComments();
        }

        function closeModal() {
            document.getElementById('articleModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Comment System
        function addComment() {
            const input = document.getElementById('commentInput');
            if(!input.value) return;
            let cms = JSON.parse(localStorage.getItem('cms_' + currentId)) || [];
            cms.push(input.value);
            localStorage.setItem('cms_' + currentId, JSON.stringify(cms));
            input.value = "";
            loadComments();
            showToast("Komentar ditambahkan.");
        }

        function loadComments() {
            const box = document.getElementById('comments-display');
            let cms = JSON.parse(localStorage.getItem('cms_' + currentId)) || [];
            box.innerHTML = cms.map(c => `<div style="background:#08080a; padding:12px; border-radius:10px; margin-bottom:10px; border-left:3px solid var(--accent); font-size:0.85rem;">${c}</div>`).join("");
        }

        // Global Listeners
        window.onscroll = () => {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("progressBar").style.width = (winScroll / height) * 100 + "%";
        };

        window.addEventListener('offline', () => document.getElementById('offline-tag').style.display = 'inline');
        window.addEventListener('online', () => document.getElementById('offline-tag').style.display = 'none');

        // Init
        fetchArticles();
        renderSaved();
        setTimeout(() => showToast("Sistem Terenkripsi. Selamat Datang."), 1000);
    </script>
</body>
</html>
