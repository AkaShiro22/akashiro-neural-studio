<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LOGIC | System Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <style>
        :root {
            --accent: #00ff88;
            --bg: #050509; 
            --card: rgba(17, 17, 24, 0.6); 
            --text: #f8fafc;
            --muted: #8892b0;
            --glass-blur: blur(20px);
            --gradient: linear-gradient(135deg, #00ff88 0%, #0072ff 100%);
            --border-glass: 1px solid rgba(255, 255, 255, 0.04);
        }

        .light-mode {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.7);
            --text: #0f172a;
            --muted: #64748b;
            --border-glass: 1px solid rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; top: 0 !important; cursor: crosshair; }

        /* --- NAVIGATION --- */
        nav {
            position: sticky; top: 0; z-index: 2000; padding: 15px 6%;
            background: var(--card); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: var(--border-glass); display: flex; justify-content: space-between; align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; font-family: 'Space Grotesk'; font-weight: 700; color: var(--text); }
        .logo-box { padding: 5px 12px; background: var(--gradient); color: #000; border-radius: 10px; }

        /* --- NEW: STATUS BAR --- */
        .status-bar {
            background: rgba(0, 255, 136, 0.03);
            border-bottom: var(--border-glass);
            padding: 8px 6%;
            display: flex;
            gap: 20px;
            font-size: 0.7rem;
            font-family: 'Space Grotesk';
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            overflow-x: auto;
            white-space: nowrap;
        }
        .status-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* --- HERO & FEED --- */
        .hero { padding: 50px 6% 20px; text-align: center; }
        .hero h1 { font-family: 'Space Grotesk'; font-size: 3rem; margin-bottom: 10px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 6%; }
        #feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }

        .card { 
            background: var(--card); border-radius: 24px; overflow: hidden; border: var(--border-glass); 
            cursor: pointer; backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 20px; }

        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 4000; padding: 20px; overflow-y: auto; backdrop-filter: blur(10px); }
        .m-content { background: var(--card); max-width: 800px; margin: 40px auto; border-radius: 30px; padding: 40px; border: var(--border-glass); position: relative; }
        .close { position: absolute; top: 20px; right: 25px; font-size: 2rem; cursor: pointer; color: var(--muted); }

        /* --- FAB --- */
        .fab-container { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 3000; }
        .fab { width: 50px; height: 50px; border-radius: 15px; background: var(--card); border: 1px solid var(--accent); color: var(--accent); cursor: pointer; display: grid; place-items: center; backdrop-filter: var(--glass-blur); }

        .btn-social { padding: 10px 15px; border-radius: 10px; border: none; color: white; cursor: pointer; font-size: 0.8rem; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body class="dark-mode">

<nav>
    <a href="#" class="logo">
        <span class="logo-box">NL</span>
        <span class="notranslate">NEURAL LOGIC</span>
    </a>
    <div id="google_translate_element"></div>
    <button class="fab" style="width:35px; height:35px; border:none;" onclick="toggleTheme()">🌓</button>
</nav>

<div class="status-bar">
    <div class="status-item">
        <div class="dot"></div>
        <span>System: <span style="color: var(--accent)">Secure</span></span>
    </div>
    <div class="status-item">
        <span>Uptime: <span id="uptime-timer">00:00:00</span></span>
    </div>
    <div class="status-item">
        <span>Articles: <span id="article-count" style="color: #fff">0</span></span>
    </div>
    <div class="status-item">
        <span>Ping: <span id="ping-val">--</span>ms</span>
    </div>
</div>

<div class="hero">
    <h1>Neural Logic</h1>
    <p style="color: var(--muted)">Eksplorasi Teknologi & Masa Depan.</p>
</div>

<div class="container">
    <div id="feed"></div>
</div>

<div class="fab-container">
    <button class="fab" onclick="window.open('https://saweria.co/akashiro', '_blank')" title="Support Me">☕</button>
    <button class="fab" onclick="showSaved()">🔖</button>
    <button class="fab" onclick="window.scrollTo({top:0, behavior:'smooth'})">▲</button>
</div>

<div id="modal" class="modal" onclick="closeModal()">
    <div class="m-content" onclick="event.stopPropagation()">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="m-img" style="width:100%; border-radius: 20px; margin-bottom: 20px;">
        <h2 id="m-title" style="margin-bottom: 15px;"></h2>
        <p id="m-body" style="color: var(--muted); line-height: 1.6;"></p>
        <div style="margin-top: 25px; display: flex; gap: 10px;">
            <button onclick="shareWA()" class="btn-social" style="background: #25d366;">WhatsApp</button>
            <button onclick="speak()" class="btn-social" style="background: var(--accent); color: #000;">Dengar Audio</button>
        </div>
    </div>
</div>

<script>
    let allData = [];
    let startTime = Date.now();

    // 1. UPDATE STATUS REALTIME
    function updateSystemStatus() {
        // Update Uptime
        const now = Date.now();
        const diff = new Date(now - startTime);
        const h = String(diff.getUTCHours()).padStart(2, '0');
        const m = String(diff.getUTCMinutes()).padStart(2, '0');
        const s = String(diff.getUTCSeconds()).padStart(2, '0');
        document.getElementById('uptime-timer').innerText = `${h}:${m}:${s}`;

        // Update Pseudo-Ping (Simulasi kestabilan jaringan)
        const ping = Math.floor(Math.random() * (45 - 20 + 1) + 20);
        document.getElementById('ping-val').innerText = ping;
    }

    async function init() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            allData = await res.json();
            
            // Update Article Count di Status Bar
            document.getElementById('article-count').innerText = allData.length;
            
            display(allData.sort((a,b) => b.id - a.id));
            setInterval(updateSystemStatus, 1000);
        } catch (e) {
            console.error("Gagal load data");
        }
    }

    function display(data) {
        const feed = document.getElementById('feed');
        feed.innerHTML = data.map(a => `
            <div class="card" onclick='openModal(${JSON.stringify(a)})'>
                <img src="${a.img}" class="card-img">
                <div class="card-content">
                    <small style="color:var(--accent)">${a.cat}</small>
                    <h3 style="margin-top:5px">${a.title}</h3>
                </div>
            </div>
        `).join('');
    }

    let currentArt;
    function openModal(a) {
        currentArt = a;
        document.getElementById('m-img').src = a.img;
        document.getElementById('m-title').innerText = a.title;
        document.getElementById('m-body').innerText = a.body;
        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
        window.speechSynthesis.cancel();
    }

    function shareWA() {
        const text = encodeURIComponent(`*${currentArt.title}*\n${window.location.href}`);
        window.open(`https://api.whatsapp.com/send?text=${text}`);
    }

    function speak() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(currentArt.body);
        msg.lang = 'id-ID';
        window.speechSynthesis.speak(msg);
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
    }

    function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'id'}, 'google_translate_element');
    }

    init();
</script>

</body>
</html>
