<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LOGIC | Aesthetic v25.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">

    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <style>
        :root {
            --accent: #00ff88;
            --bg: #050509;
            --card: rgba(17, 17, 24, 0.6);
            --text: #f8fafc;
            --muted: #8892b0;
            --glass-blur: blur(20px);
            --gradient: linear-gradient(135deg, #00ff88 0%, #0072ff 100%);
            --border-glass: 1px solid rgba(255, 255, 255, 0.04);
        }

        .light-mode {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.7);
            --text: #0f172a;
            --muted: #64748b;
            --glass-blur: blur(15px);
            --border-glass: 1px solid rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s, transform 0.2s cubic-bezier(0.2, 0, 0.2, 1); }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; top: 0 !important; cursor: none; }

        /* --- CURSOR TRACKER --- */
        #cursor-tracker {
            position: fixed; width: 40px; height: 40px; background: rgba(0, 255, 136, 0.1);
            border-radius: 50%; pointer-events: none; z-index: 10000;
            transform: translate(-50%, -50%); border: 1px solid var(--accent);
            box-shadow: 0 0 15px var(--accent); display: none;
        }

        /* --- LIVE STATUS CONSOLE --- */
        .status-console {
            display: flex; justify-content: center; gap: 25px; margin: 25px auto;
            padding: 12px 28px; max-width: fit-content;
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px; backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            flex-wrap: wrap;
        }

        .status-item { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; min-width: 80px; }
        .status-label { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; }
        .status-data { font-family: 'Space Grotesk'; font-size: 0.85rem; color: var(--text); display: flex; align-items: center; gap: 6px; }
        
        .live-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; position: relative; }
        .live-dot::after { content: ''; position: absolute; inset: -3px; border-radius: 50%; border: 1px solid var(--accent); animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
        .accent-text { color: var(--accent); text-shadow: 0 0 10px rgba(0, 255, 136, 0.3); }

        /* --- NAVIGATION --- */
        nav {
            position: sticky; top: 0; z-index: 2000; padding: 15px 6%;
            background: var(--card); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: var(--border-glass); display: flex; justify-content: space-between; align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; font-family: 'Space Grotesk'; font-weight: 700; color: var(--text); font-size: 1.3rem; }
        .logo-box { padding: 5px 12px; background: var(--gradient); color: #000; border-radius: 10px; box-shadow: 0 0 10px rgba(0,255,136,0.3); }
        #scroll-progress { position: fixed; top: 0; left: 0; height: 3px; background: var(--gradient); z-index: 2100; width: 0%; }

        /* --- HERO --- */
        .hero { padding: 60px 6% 30px; text-align: center; }
        .hero h1 { font-family: 'Space Grotesk'; font-size: 3.5rem; margin-bottom: 10px; letter-spacing: -2px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { display: inline-block; padding: 6px 16px; border-radius: 50px; background: rgba(0, 255, 136, 0.05); color: var(--accent); font-size: 0.75rem; font-weight: 700; border: 1px solid rgba(0,255,136,0.15); }

        .search-bar { max-width: 550px; margin: 30px auto; position: relative; }
        .search-bar input { width: 100%; padding: 18px 28px; border-radius: 20px; border: var(--border-glass); background: var(--card); color: var(--text); font-family: inherit; font-size: 1.05rem; backdrop-filter: var(--glass-blur); }
        .search-bar input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 25px rgba(0,255,136,0.15); }

        /* --- FEED --- */
        #feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; padding: 0 6% 60px; }
        .card { background: var(--card); border-radius: 28px; overflow: hidden; border: var(--border-glass); cursor: pointer; position: relative; backdrop-filter: var(--glass-blur); animation: slideUp 0.7s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .card-img { width: 100%; height: 220px; object-fit: cover; transition: 0.6s; }
        .card-content { padding: 25px; }
        .card-meta { display: flex; justify-content: space-between; margin-top: 15px; font-size: 0.8rem; color: var(--muted); border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }

        .fab-container { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 3000; }
        .fab { width: 55px; height: 55px; border-radius: 18px; background: var(--card); border: 1px solid var(--accent); color: var(--accent); cursor: pointer; display: grid; place-items: center; font-size: 1.3rem; backdrop-filter: var(--glass-blur); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .skeleton { background: rgba(255,255,255,0.03); border-radius: 28px; height: 350px; position: relative; overflow: hidden; }
        .skeleton::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
    </style>
</head>
<body class="dark-mode">

<div id="cursor-tracker"></div>
<div id="scroll-progress"></div>

<nav>
    <a href="javascript:location.reload()" class="logo">
        <span class="logo-box">NL</span>
        <span class="notranslate">NEURAL LOGIC</span>
    </a>
    <div id="google_translate_element"></div>
    <button class="fab" style="width:38px; height:38px; border:none; border-radius: 12px;" onclick="toggleTheme()">🌓</button>
</nav>

<div class="hero">
    <div class="badge">Aesthetic Update v25.1</div>
    <h1 id="hero-title" class="notranslate">Neural Logic</h1>
    <p style="color: var(--muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto;">Navigasi masa depan IPTEK dengan estetika tinggi.</p>

    <div class="status-console">
        <div class="status-item">
            <span class="status-label">Network</span>
            <span class="status-data"><div class="live-dot"></div> <span id="net-status" class="accent-text">ONLINE</span></span>
        </div>
        <div class="status-item">
            <span class="status-label">Uptime</span>
            <span class="status-data accent-text" id="uptime-val">00:00:00</span>
        </div>
        <div class="status-item">
            <span class="status-label">Live Views</span>
            <span class="status-data accent-text" id="view-count">1,204</span>
        </div>
        <div class="status-item">
            <span class="status-label">Latency</span>
            <span class="status-data accent-text" id="ping-val">24 ms</span>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Cari teknologi atau inovasi..." onkeyup="handleSearch()">
    </div>
</div>

<div id="feed">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
</div>

<div class="fab-container">
    <button class="fab" onclick="window.open('https://saweria.co/akashiro', '_blank')">☕</button>
    <button class="fab" onclick="showSaved()">🔖</button>
    <button class="fab" onclick="window.scrollTo({top:0, behavior:'smooth'})">▲</button>
</div>

<script>
    let allData = [];
    let startTime = Date.now();

    // --- LIVE INDICATOR LOGIC ---
    function updateLiveStats() {
        // Uptime Calculation
        const diff = Math.floor((Date.now() - startTime) / 1000);
        const hrs = String(Math.floor(diff / 3600)).padStart(2, '0');
        const mins = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
        const secs = String(diff % 60).padStart(2, '0');
        document.getElementById('uptime-val').innerText = `${hrs}:${mins}:${secs}`;

        // Live Views Simulation (Angka fluktuatif halus)
        const currentViews = parseInt(document.getElementById('view-count').innerText.replace(',', ''));
        const change = Math.floor(Math.random() * 5) - 2; // -2 sampai +2
        document.getElementById('view-count').innerText = (currentViews + change).toLocaleString();

        // Ping Simulation
        const ping = Math.floor(Math.random() * (42 - 18 + 1)) + 18;
        document.getElementById('ping-val').innerText = `${ping} ms`;

        // Network Status Check
        const netText = document.getElementById('net-status');
        if(!navigator.onLine) {
            netText.innerText = "OFFLINE";
            netText.style.color = "#ff4444";
        } else {
            netText.innerText = "ONLINE";
            netText.style.color = "var(--accent)";
        }
    }
    setInterval(updateLiveStats, 1000);

    // --- CORE LOGIC ---
    const cursor = document.getElementById('cursor-tracker');
    if (window.matchMedia("(pointer: fine)").matches) {
        cursor.style.display = 'block';
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    }

    function googleTranslateElementInit() {
        new google.translate.TranslateElement({ pageLanguage: 'id', layout: google.translate.TranslateElement.InlineLayout.SIMPLE }, 'google_translate_element');
    }

    async function init() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            allData = await res.json();
            setTimeout(() => display(allData.sort((a,b) => b.id - a.id)), 1000);
        } catch (e) {
            document.getElementById('feed').innerHTML = "<p>Gagal memuat konten.</p>";
        }
    }

    function display(data) {
        const feed = document.getElementById('feed');
        feed.innerHTML = data.map(a => `
            <div class="card">
                <img src="${a.img}" class="card-img" onerror="this.src='https://via.placeholder.com/400x220/111/00ff88?text=Neural+Logic'">
                <div class="card-content">
                    <span class="badge" style="font-size:0.6rem; margin-bottom:10px;">${a.cat}</span>
                    <h2 style="font-family:'Space Grotesk'; font-size:1.1rem;">${a.title}</h2>
                    <div class="card-meta"><span>#${a.id}</span><span>⏱️ ${Math.ceil(a.body.split(' ').length/200)} min</span></div>
                </div>
            </div>
        `).join('');
    }

    function handleSearch() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        display(allData.filter(a => a.title.toLowerCase().includes(q) || a.cat.toLowerCase().includes(q)));
    }

    function toggleTheme() { document.body.classList.toggle('light-mode'); }

    window.onscroll = () => {
        let winScroll = document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("scroll-progress").style.width = (winScroll / height) * 100 + "%";
    };

    init();
</script>

</body>
</html>
