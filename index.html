<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LOGIC | Futuristic Tech & AI Prompts 2026</title>
    <meta name="description" content="Neural Logic adalah pusat inovasi teknologi masa depan, tren AI terbaru, dan koleksi prompt AI profesional untuk produktivitas Anda.">
    <meta name="author" content="Neural Logic Team">
    <link rel="canonical" href="https://yourdomain.com/">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #00ff88; 
            --bg: #050509; 
            --card: rgba(17, 17, 24, 0.8);
            --text: #f8fafc; 
            --muted: #8892b0;
            --gradient: linear-gradient(135deg, var(--accent) 0%, #0072ff 100%);
            --border-glass: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* THEME VARIANTS */
        body.theme-cyber { --accent: #ff00ff; --gradient: linear-gradient(135deg, #ff00ff 0%, #7000ff 100%); }
        body.theme-ocean { --accent: #00d9ff; --gradient: linear-gradient(135deg, #00d9ff 0%, #0044ff 100%); }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; min-height: 100vh; transition: background 0.4s; }

        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--gradient); width: 0%; z-index: 1001; transition: width 0.2s; }

        nav { position: sticky; top: 0; z-index: 100; padding: 12px 6%; background: rgba(5, 5, 9, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: var(--border-glass); }
        .logo { font-family: 'Space Grotesk'; font-weight: 700; color: var(--text); text-decoration: none; font-size: 1.1rem; display: flex; align-items: center; }
        .logo-box { padding: 4px 10px; background: var(--gradient); color: #000; border-radius: 8px; margin-right: 8px; }

        .theme-switches { display: flex; gap: 12px; }
        .dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); transition: 0.2s; }
        .dot:hover { transform: scale(1.2); }

        .tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; padding: 0 6%; flex-wrap: wrap; }
        .tab-btn { background: var(--card); border: var(--border-glass); color: var(--muted); padding: 12px 22px; border-radius: 14px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .search-container { padding: 0 6%; margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 16px 20px; border-radius: 18px; background: var(--card); border: var(--border-glass); color: #fff; outline: none; transition: 0.3s; font-size: 1rem; }
        #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }

        #feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 20px 6% 80px; }

        /* CARD STYLES */
        .card { 
            background: var(--card); border-radius: 26px; overflow: hidden; border: var(--border-glass); 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative;
            opacity: 0; transform: translateY(30px);
        }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        .card-img { width: 100%; height: 190px; object-fit: cover; background: #111; transition: 0.5s; }
        .card:hover .card-img { transform: scale(1.05); }
        .card-content { padding: 22px; }

        .read-time { font-size: 0.7rem; color: var(--muted); float: right; margin-top: 2px; }
        .bookmark-badge { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 10px; backdrop-filter: blur(5px); z-index: 2; color: gold; font-size: 0.8rem; border: 1px solid rgba(255,215,0,0.3); }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; z-index: 1000; padding: 20px; overflow-y: auto; backdrop-filter: blur(15px); }
        .m-content { background: #0f0f16; max-width: 680px; margin: 40px auto; border-radius: 32px; padding: 35px; border: var(--border-glass); position: relative; }

        .btn-group { display: flex; gap: 12px; margin-top: 10px; }
        .primary-btn { background: var(--accent); color:#000; padding:16px; border:none; border-radius:16px; font-weight:700; cursor:pointer; flex: 2; transition: 0.2s; }
        .primary-btn:active { transform: scale(0.98); }
        .sec-btn { background: #1e1e26; color:#fff; padding:16px; border:none; border-radius:16px; cursor:pointer; flex: 1; font-weight: 600; }

        .share-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 10px; margin-top: 30px; padding-top: 25px; border-top: var(--border-glass); }
        .share-item { padding: 12px; border-radius: 14px; border: var(--border-glass); background: #1a1a24; color: #fff; cursor: pointer; font-size: 0.75rem; transition: 0.2s; text-align: center; font-weight: 600; }
        .share-item:hover { background: #252533; border-color: var(--accent); }

        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 12px 30px; border-radius: 50px; font-weight: 800; display: none; z-index: 2000; box-shadow: 0 10px 30px rgba(0,255,136,0.3); }
        
        /* ACCESSIBILITY: Visually Hidden for SEO */
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>

<div id="progress-bar" aria-hidden="true"></div>
<div id="toast" class="toast" role="alert">Action Confirmed!</div>

<nav>
    <a href="/" class="logo" aria-label="Neural Logic Home">
        <span class="logo-box" aria-hidden="true">NL</span>NEURAL LOGIC
    </a>
    <div class="theme-switches">
        <button class="dot" style="background:#00ff88" onclick="setTheme('default')" aria-label="Default Green Theme"></button>
        <button class="dot" style="background:#ff00ff" onclick="setTheme('cyber')" aria-label="Cyber Pink Theme"></button>
        <button class="dot" style="background:#00d9ff" onclick="setTheme('ocean')" aria-label="Ocean Blue Theme"></button>
    </div>
</nav>

<header class="sr-only">
    <h1>Neural Logic - Tech Innovation Hub 2026</h1>
</header>

<div class="tabs" role="tablist">
    <button class="tab-btn active" onclick="filterTab('ALL')" role="tab">All Trends</button>
    <button class="tab-btn" onclick="filterTab('NEURAL TECH')" role="tab">Tech Hub</button>
    <button class="tab-btn" onclick="filterTab('AI PROMPT')" role="tab">AI Library</button>
    <button class="tab-btn" onclick="filterTab('BOOKMARK')" style="color: var(--accent)" role="tab">★ Favorites</button>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search neural database (keywords, trends...)" aria-label="Search articles">
</div>

<main id="feed"></main>

<div id="modal" class="modal" aria-modal="true" role="dialog">
    <div class="m-content">
        <img id="m-img" src="" alt="Article cover image" style="width:100%; border-radius: 22px; margin-bottom: 25px; object-fit: cover; max-height: 320px;">
        <h2 id="m-title" style="color: var(--accent); font-family: 'Space Grotesk'; margin-bottom: 15px; font-size: 1.8rem;"></h2>
        <p id="m-body" style="color: var(--text); opacity: 0.95; line-height: 1.8; margin-bottom: 30px; font-size: 1.1rem; white-space: pre-wrap;"></p>

        <div class="btn-group">
            <button id="actionBtn" class="primary-btn">⚡ Action</button>
            <button id="saveBtn" class="sec-btn">☆ Save</button>
            <button onclick="closeModal()" class="sec-btn">Close</button>
        </div>

        <div class="share-grid">
            <button class="share-item" onclick="shareTo('whatsapp')">WhatsApp</button>
            <button class="share-item" onclick="shareTo('facebook')">Facebook</button>
            <button class="share-item" onclick="shareTo('x')">X / Twitter</button>
            <button class="share-item" onclick="shareTo('native')">Copy Link</button>
        </div>
    </div>
</div>

<script>
    let allData = [];
    let currentFilter = 'ALL';
    let bookmarks = JSON.parse(localStorage.getItem('nl_bookmarks')) || [];

    async function init() {
        try {
            const res = await fetch('data.json');
            const rawData = await res.json();
            allData = [...rawData].reverse();
            renderFeed(allData);
        } catch (e) {
            document.getElementById('feed').innerHTML = "<p style='text-align:center; color:var(--muted)'>Waiting for data.json connection...</p>";
        }
    }

    function getReadTime(text) {
        const words = text.trim().split(/\s+/).length;
        return Math.ceil(words / 225); // 225 wpm average
    }

    function renderFeed(data) {
        const feed = document.getElementById('feed');
        if(data.length === 0) {
            feed.innerHTML = "<p style='grid-column:1/-1; text-align:center; padding:50px; color:var(--muted)'>No neural data found in this category.</p>";
            return;
        }

        feed.innerHTML = data.map((a) => {
            const isSaved = bookmarks.includes(a.id);
            const time = getReadTime(a.body);
            return `
            <article class="card" onclick="openModalById(${a.id})" aria-label="Read article: ${a.title}">
                ${isSaved ? '<div class="bookmark-badge">★ Saved</div>' : ''}
                <img src="${a.img}" alt="Illustration for ${a.title}" loading="lazy" class="card-img">
                <div class="card-content">
                    <span class="read-time" aria-label="Reading time">⏲️ ${time} min</span>
                    <small style="color:var(--accent); font-weight:700; text-transform:uppercase; font-size:0.7rem; letter-spacing:1px;">${a.cat}</small>
                    <h3 style="font-size:1.15rem; margin-top:8px; font-family:'Space Grotesk'; line-height:1.4;">${a.title}</h3>
                </div>
            </article>
        `}).join('');
        
        observeCards(); 
    }

    function observeCards() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.card').forEach(c => observer.observe(c));
    }

    function filterTab(cat) {
        currentFilter = cat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(event) event.target.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        let filtered = allData;

        if(currentFilter === 'BOOKMARK') {
            filtered = allData.filter(a => bookmarks.includes(a.id));
        } else if(currentFilter !== 'ALL') {
            filtered = allData.filter(a => a.cat === currentFilter);
        }

        filtered = filtered.filter(a => 
            a.title.toLowerCase().includes(term) || a.body.toLowerCase().includes(term)
        );
        renderFeed(filtered);
    }

    document.getElementById('searchInput').addEventListener('input', applyFilters);

    function openModalById(id) {
        const item = allData.find(x => x.id === id);
        if(!item) return;

        const mImg = document.getElementById('m-img');
        mImg.src = item.img;
        mImg.alt = "Featured image for " + item.title;
        
        document.getElementById('m-title').innerText = item.title;
        document.getElementById('m-body').innerText = item.body;
        
        const actionBtn = document.getElementById('actionBtn');
        const saveBtn = document.getElementById('saveBtn');

        if(item.cat === "AI PROMPT") {
            actionBtn.innerHTML = "📋 Copy Prompt";
            actionBtn.onclick = () => { copyText(item.body); showToast("Prompt Copied to Clipboard!"); };
        } else {
            actionBtn.innerHTML = "🔊 Speak Article (US)";
            actionBtn.onclick = () => speak(item.title, item.body);
        }

        const isSaved = bookmarks.includes(item.id);
        saveBtn.innerText = isSaved ? "★ Saved" : "☆ Save to Favorites";
        saveBtn.onclick = () => toggleBookmark(item.id);

        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function toggleBookmark(id) {
        if(bookmarks.includes(id)) {
            bookmarks = bookmarks.filter(b => b !== id);
            showToast("Removed from favorites");
        } else {
            bookmarks.push(id);
            showToast("Added to favorites!");
        }
        localStorage.setItem('nl_bookmarks', JSON.stringify(bookmarks));
        applyFilters();
        closeModal();
    }

    function setTheme(t) {
        document.body.className = (t === 'default' ? '' : 'theme-' + t);
        showToast("Theme changed to " + t);
    }

    function speak(t, b) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(`${t}. ${b}`);
        msg.lang = 'en-US';
        const voices = window.speechSynthesis.getVoices();
        const usVoice = voices.find(v => v.lang === 'en-US' || v.lang === 'en_US');
        if(usVoice) msg.voice = usVoice;
        window.speechSynthesis.speak(msg);
    }

    function copyText(text) {
        navigator.clipboard.writeText(text);
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }

    function shareTo(platform) {
        const url = encodeURIComponent(window.location.href);
        const text = encodeURIComponent(document.getElementById('m-title').innerText);
        const links = {
            whatsapp: `https://api.whatsapp.com/send?text=${text}%20${url}`,
            facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}`,
            x: `https://twitter.com/intent/tweet?text=${text}&url=${url}`
        };
        if(platform === 'native') { 
            copyText(window.location.href); 
            showToast("URL Copied!"); 
            return; 
        }
        window.open(links[platform], '_blank', 'noopener,noreferrer');
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
        window.speechSynthesis.cancel();
    }

    window.onclick = (e) => { if (e.target.id === 'modal') closeModal(); };

    window.addEventListener('scroll', () => {
        const winScroll = document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
    });

    init();
</script>
</body>
</html>
