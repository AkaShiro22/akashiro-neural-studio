<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#08080a">
    <link rel="manifest" href="manifest.json">
    
    <title>NEURAL LOGIC | Ultimate IPTEK 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Theme Dark (Default) */
            --accent: #00ff88;
            --bg-dark: #08080a;
            --card-bg: rgba(18, 18, 23, 0.8);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --nav-bg: rgba(8, 8, 10, 0.9);
        }

        /* Theme Light Class */
        .light-mode {
            --accent: #0070f3;
            --bg-dark: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1a1a1a;
            --text-muted: #4a5568;
            --nav-bg: rgba(255, 255, 255, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { 
            background: var(--bg-dark); 
            font-family: 'Inter', sans-serif; 
            color: var(--text-main); 
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: var(--nav-bg); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .brand { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--accent); }

        .nav-tools { display: flex; gap: 15px; align-items: center; }
        
        /* Toggle Switch */
        .theme-switch {
            cursor: pointer; padding: 5px 12px; border-radius: 20px;
            background: var(--accent); color: white; font-size: 0.7rem; font-weight: 700;
        }

        .search-box {
            background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1);
            padding: 8px 15px; border-radius: 30px; color: var(--text-main); outline: none; width: 180px;
        }

        /* Layout */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 5%; display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 900px) { .container { grid-template-columns: 2.5fr 1fr; } aside { position: sticky; top: 90px; height: fit-content; } }

        /* Cards */
        .post-card {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 20px; border: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 20px; padding: 25px; cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .post-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .post-tag { color: var(--accent); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .post-title { font-size: 1.3rem; margin: 10px 0; }

        .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 0.7rem; margin-right: 5px; }
        .btn-primary { background: var(--accent); color: #fff; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 2000; padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: var(--card-bg); max-width: 700px; margin: 40px auto; padding: 40px; border-radius: 24px; border: 2px solid var(--accent); position: relative; max-height: 80vh; overflow-y: auto; color: var(--text-main); }
        .close { position: absolute; top: 20px; right: 25px; font-size: 2rem; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <div class="brand">NEURAL LOGIC</div>
        <div class="nav-tools">
            <input type="text" id="searchInput" class="search-box" placeholder="Cari..." onkeyup="search()">
            <div class="theme-switch" onclick="toggleTheme()">MODE</div>
        </div>
    </nav>

    <div class="container">
        <main id="feed"></main>
        <aside>
            <div style="background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--accent);">
                <h3>Statistik Portal</h3>
                <p style="font-size: 0.8rem; margin-top: 10px;">Total: 50 Artikel IPTEK</p>
                <p style="font-size: 0.8rem;">Status: Terenkripsi</p>
            </div>
        </aside>
    </div>

    <div class="modal" id="myModal">
        <div class="modal-content">
            <span class="close" onclick="closeM()">&times;</span>
            <h2 id="mTitle" style="margin-bottom: 20px;"></h2>
            <div id="mBody" style="line-height: 1.7;"></div>
            <hr style="margin: 20px 0; opacity: 0.2;">
            <button class="btn btn-primary" onclick="speak()">🔊 Baca Berita</button>
            <button class="btn" style="background:#ff4444; color:#fff" onclick="stop()">⏹ Berhenti</button>
        </div>
    </div>

    <script>
        let db = [];

        async function load() {
            const res = await fetch('data.json');
            db = await res.json();
            render(db.sort((a,b) => b.id - a.id));
        }

        function render(data) {
            const f = document.getElementById('feed');
            f.innerHTML = data.map(a => `
                <div class="post-card" onclick='openM(${JSON.stringify(a).replace(/'/g, "&apos;")})'>
                    <span class="post-tag">${a.cat}</span>
                    <h2 class="post-title">${a.title}</h2>
                    <p style="font-size: 0.8rem; color: var(--text-muted)">Ketuk untuk membaca selengkapnya...</p>
                </div>
            `).join('');
        }

        function search() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            render(db.filter(a => a.title.toLowerCase().includes(q)));
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const mode = document.body.classList.contains('light-mode') ? 'LIGHT' : 'DARK';
            document.querySelector('.theme-switch').innerText = mode;
        }

        function openM(a) {
            document.getElementById('mTitle').innerText = a.title;
            document.getElementById('mBody').innerText = a.body;
            document.getElementById('myModal').style.display = 'block';
        }

        function closeM() { 
            document.getElementById('myModal').style.display = 'none'; 
            window.speechSynthesis.cancel();
        }

        function speak() {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(document.getElementById('mTitle').innerText + ". " + document.getElementById('mBody').innerText);
            msg.lang = 'id-ID';
            window.speechSynthesis.speak(msg);
        }

        function stop() { window.speechSynthesis.cancel(); }

        load();
    </script>
</body>
</html>
