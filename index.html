<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LOGIC | System Status & Social</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <style>
        :root {
            --accent: #00ff88;
            --bg: #050509; 
            --card: rgba(17, 17, 24, 0.6); 
            --text: #f8fafc;
            --muted: #8892b0;
            --glass-blur: blur(20px);
            --gradient: linear-gradient(135deg, #00ff88 0%, #0072ff 100%);
            --border-glass: 1px solid rgba(255, 255, 255, 0.04);
        }

        .light-mode {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.7);
            --text: #0f172a;
            --muted: #64748b;
            --border-glass: 1px solid rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; top: 0 !important; }

        /* --- NAVIGATION --- */
        nav {
            position: sticky; top: 0; z-index: 2000; padding: 15px 6%;
            background: var(--card); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: var(--border-glass); display: flex; justify-content: space-between; align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; font-family: 'Space Grotesk'; font-weight: 700; color: var(--text); }
        .logo-box { padding: 5px 12px; background: var(--gradient); color: #000; border-radius: 10px; }

        /* --- STATUS BAR --- */
        .status-bar {
            background: rgba(0, 255, 136, 0.03);
            border-bottom: var(--border-glass);
            padding: 8px 6%;
            display: flex; gap: 20px; font-size: 0.7rem; font-family: 'Space Grotesk';
            color: var(--muted); text-transform: uppercase; letter-spacing: 1px; overflow-x: auto;
        }
        .status-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* --- FLOATING SHARE SIDEBAR --- */
        .share-sidebar {
            position: fixed; left: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 10px; z-index: 2500;
        }
        @media (max-width: 768px) { .share-sidebar { display: none; } }
        .share-item {
            width: 45px; height: 45px; border-radius: 12px; display: grid; place-items: center;
            text-decoration: none; color: white; font-size: 1rem; font-weight: bold;
            backdrop-filter: var(--glass-blur); border: var(--border-glass); transition: 0.3s;
        }
        .share-item:hover { transform: scale(1.1) translateX(5px); border-color: var(--accent); }
        .sh-fb { background: #1877f2; }
        .sh-x { background: #000; }
        .sh-wa { background: #25d366; }
        .sh-tg { background: #229ED9; }
        .sh-copy { background: var(--gradient); color: #000; cursor: pointer; }

        /* --- HERO & FEED --- */
        .hero { padding: 50px 6% 20px; text-align: center; }
        .hero h1 { font-family: 'Space Grotesk'; font-size: 3rem; margin-bottom: 10px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 6%; }
        #feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }

        .card { 
            background: var(--card); border-radius: 24px; overflow: hidden; border: var(--border-glass); 
            cursor: pointer; backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 20px; }

        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 4000; padding: 20px; overflow-y: auto; backdrop-filter: blur(10px); }
        .m-content { background: var(--card); max-width: 800px; margin: 40px auto; border-radius: 30px; padding: 40px; border: var(--border-glass); position: relative; }
        .close { position: absolute; top: 20px; right: 25px; font-size: 2rem; cursor: pointer; color: var(--muted); }

        /* --- FAB --- */
        .fab-container { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 3000; }
        .fab { 
            width: 50px; height: 50px; border-radius: 15px; background: var(--card); 
            border: 1px solid var(--accent); color: var(--accent); cursor: pointer; 
            display: grid; place-items: center; backdrop-filter: var(--glass-blur); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .fab:hover { background: var(--accent); color: #000; transform: scale(1.1); }
    </style>
</head>
<body class="dark-mode">

<div class="share-sidebar">
    <a href="https://www.facebook.com/sharer/sharer.php?u=https://AkaShiro22.github.io" target="_blank" class="share-item sh-fb">FB</a>
    <a href="https://twitter.com/intent/tweet?url=https://AkaShiro22.github.io" target="_blank" class="share-item sh-x">X</a>
    <a href="https://api.whatsapp.com/send?text=Cek website teknologi keren: https://AkaShiro22.github.io" target="_blank" class="share-item sh-wa">WA</a>
    <a href="https://t.me/share/url?url=https://AkaShiro22.github.io" target="_blank" class="share-item sh-tg">TG</a>
    <div onclick="copyCurrentLink()" class="share-item sh-copy">🔗</div>
</div>

<nav>
    <a href="#" class="logo">
        <span class="logo-box">NL</span>
        <span class="notranslate">NEURAL LOGIC</span>
    </a>
    <div id="google_translate_element"></div>
    <button class="fab" style="width:35px; height:35px; border:none;" onclick="toggleTheme()">🌓</button>
</nav>

<div class="status-bar">
    <div class="status-item">
        <div class="dot"></div>
        <span>System: <span style="color: var(--accent)">Secure</span></span>
    </div>
    <div class="status-item">
        <span>Uptime: <span id="uptime-timer">00:00:00</span></span>
    </div>
    <div class="status-item">
        <span>Articles: <span id="article-count" style="color: #fff">0</span></span>
    </div>
    <div class="status-item">
        <span>Ping: <span id="ping-val">--</span>ms</span>
    </div>
</div>

<div class="hero">
    <h1>Neural Logic</h1>
    <p style="color: var(--muted)">Eksplorasi Teknologi & Masa Depan.</p>
</div>

<div class="container">
    <div id="feed"></div>
</div>

<div class="fab-container">
    <button class="fab" onclick="window.open('https://saweria.co/akashiro', '_blank')" title="Support Me">☕</button>
    <button class="fab" onclick="showSaved()" title="Bookmark">🔖</button>
    <button class="fab" onclick="window.scrollTo({top:0, behavior:'smooth'})" title="Top">▲</button>
</div>

<div id="modal" class="modal" onclick="closeModal()">
    <div class="m-content" onclick="event.stopPropagation()">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="m-img" style="width:100%; border-radius: 20px; margin-bottom: 20px; max-height: 400px; object-fit: cover;">
        <h2 id="m-title" style="margin-bottom: 15px; font-family: 'Space Grotesk';"></h2>
        <p id="m-body" style="color: var(--muted); line-height: 1.8; font-size: 1.1rem;"></p>
        
        <div style="margin-top: 30px; display: flex; gap: 12px; flex-wrap: wrap;">
            <button onclick="speak()" style="padding: 12px 25px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer;">🔊 Dengar Audio</button>
            <button onclick="shareSocialModal('wa')" style="padding: 12px 25px; border-radius: 12px; border: none; background: #25d366; color: white; font-weight: bold; cursor: pointer;">Share WhatsApp</button>
        </div>
    </div>
</div>

<script>
    let allData = [];
    let startTime = Date.now();
    let currentArt = null;

    function copyCurrentLink() {
        navigator.clipboard.writeText(window.location.href).then(() => {
            alert("✅ Link Website disalin! Silakan tempel di Story Instagram.");
        });
    }

    function updateSystemStatus() {
        const diff = new Date(Date.now() - startTime);
        const h = String(diff.getUTCHours()).padStart(2, '0');
        const m = String(diff.getUTCMinutes()).padStart(2, '0');
        const s = String(diff.getUTCSeconds()).padStart(2, '0');
        document.getElementById('uptime-timer').innerText = `${h}:${m}:${s}`;
        document.getElementById('ping-val').innerText = Math.floor(Math.random() * 25 + 20);
    }

    async function init() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            allData = await res.json();
            document.getElementById('article-count').innerText = allData.length;
            display(allData.sort((a,b) => b.id - a.id));
            setInterval(updateSystemStatus, 1000);
        } catch (e) { console.error("Error loading data"); }
    }

    function display(data) {
        const feed = document.getElementById('feed');
        feed.innerHTML = data.map(a => `
            <div class="card" onclick='openModal(${JSON.stringify(a)})'>
                <img src="${a.img}" class="card-img" loading="lazy">
                <div class="card-content">
                    <small style="color:var(--accent); font-weight:bold;">${a.cat}</small>
                    <h3 style="margin-top:8px; line-height:1.3;">${a.title}</h3>
                </div>
            </div>
        `).join('');
    }

    function openModal(a) {
        currentArt = a;
        document.getElementById('m-img').src = a.img;
        document.getElementById('m-title').innerText = a.title;
        document.getElementById('m-body').innerText = a.body;
        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
        window.speechSynthesis.cancel();
    }

    function shareSocialModal(p) {
        const url = encodeURIComponent(window.location.href);
        const txt = encodeURIComponent(`*${currentArt.title}*\nBaca di Neural Logic: `);
        if(p === 'wa') window.open(`https://api.whatsapp.com/send?text=${txt}${url}`);
    }

    function speak() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(currentArt.body);
        msg.lang = 'id-ID';
        window.speechSynthesis.speak(msg);
    }

    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'id'}, 'google_translate_element'); }

    init();
</script>

</body>
</html>
