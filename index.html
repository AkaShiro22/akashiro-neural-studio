<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LOGIC | Portal IPTEK & Monetize v16.0</title>
    
    <meta name="description" content="Portal berita IPTEK terupdate April 2026. Info AI, Gadget, dan Antariksa.">
    <meta name="keywords" content="Berita Teknologi, AI 2026, Gadget Terbaru, Neural Logic">
    
    <meta name="theme-color" content="#00ff88">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00ff88;
            --bg: #050508;
            --card: #0d0d12;
            --text: #e2e8f0;
            --muted: #8892b0;
            --border: rgba(255, 255, 255, 0.05);
        }

        .light-mode {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding-bottom: 60px; }

        /* --- AD SPACE STYLE --- */
        .ad-space {
            background: rgba(255,255,255,0.03);
            border: 1px dashed var(--muted);
            color: var(--muted);
            text-align: center;
            padding: 15px;
            margin: 20px 0;
            font-size: 0.7rem;
            border-radius: 12px;
            text-transform: uppercase;
        }

        nav {
            padding: 15px 6%; background: var(--card); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-glyph {
            width: 38px; height: 38px; background: #000; border: 2px solid var(--accent);
            border-radius: 10px; display: grid; place-items: center;
            font-family: 'Space Grotesk'; font-weight: 700; color: var(--accent);
        }
        .logo-text { font-family: 'Space Grotesk'; font-size: 1.3rem; color: var(--text); }

        .nav-tools { display: flex; gap: 15px; align-items: center; }
        .tool-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 8px; cursor: pointer; }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 6%; }
        #feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }

        .card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-title { font-family: 'Space Grotesk'; font-size: 1.1rem; margin: 10px 0; color: var(--text); }

        /* --- TICKER --- */
        #ticker-wrap {
            position: fixed; bottom: 0; width: 100%; background: var(--accent);
            color: #000; overflow: hidden; white-space: nowrap; padding: 8px 0;
            font-size: 0.85rem; font-weight: 800; z-index: 1000;
        }
        .ticker-content { display: inline-block; animation: scroll-ticker 40s linear infinite; }
        @keyframes scroll-ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* --- MODAL --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 2000; padding: 20px; overflow-y: auto; }
        .m-content { background: var(--card); max-width: 800px; margin: 20px auto; border-radius: 25px; padding: 30px; position: relative; border: 1px solid var(--border); }
        
        .action-bar { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn { padding: 10px 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
        .btn-p { background: var(--accent); color: #000; }
        .btn-buy { background: #ff4757; color: #fff; width: 100%; justify-content: center; margin-top: 20px; font-size: 1rem; }
        
        .btn-wa { background: #25d366; color: #fff; }
        .btn-x { background: #000; color: #fff; border: 1px solid #333; }

        .ai-summary {
            background: rgba(0, 255, 136, 0.1); border-left: 4px solid var(--accent);
            padding: 15px; border-radius: 0 10px 10px 0; margin-bottom: 20px; font-style: italic;
        }

        .close { position: absolute; top: 20px; right: 25px; font-size: 2rem; color: var(--text); cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">
            <div class="logo-glyph">N</div>
            <div class="logo-text">NEURAL LOGIC</div>
        </a>
        <div class="nav-tools">
            <button class="tool-btn" onclick="toggleTheme()">🌓</button>
            <button class="tool-btn" onclick="showSaved()">🔖</button>
        </div>
    </nav>

    <div class="container">
        <div class="ad-space">Iklan Anda di Sini (728x90) - Hubungi Admin</div>
        
        <h2 id="view-title" style="margin-bottom: 20px; font-family: 'Space Grotesk';">April 2026: Berita Terkini</h2>
        <div id="feed"></div>
    </div>

    <div id="ticker-wrap">
        <div class="ticker-content" id="ticker">Memuat berita terbaru...</div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="m-content" onclick="event.stopPropagation()">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="m-img" style="width: 100%; border-radius: 15px; margin-bottom: 20px;">
            
            <div class="action-bar">
                <button class="btn btn-p" onclick="speak()">🔊 Baca Berita</button>
                <button class="btn btn-wa" onclick="share('wa')">WA</button>
                <button class="btn btn-x" onclick="share('x')">X</button>
                <button class="btn btn-tool" onclick="saveArticle()">🔖 Simpan</button>
            </div>

            <div id="m-ai" class="ai-summary"></div>
            
            <div class="ad-space" style="background: rgba(0,255,136,0.05)">Sponsor: Gadget Masa Depan Diskon 50%!</div>

            <h1 id="m-title" style="font-family: 'Space Grotesk'; margin-bottom: 20px;"></h1>
            <div id="m-body" style="line-height: 1.8; font-size: 1.1rem;"></div>

            <button class="btn btn-buy" onclick="window.open('https://shopee.co.id', '_blank')">🛒 Cek Harga Produk Terkait</button>
        </div>
    </div>

    <script>
        let allArticles = [];
        let savedArticles = JSON.parse(localStorage.getItem('nn_saved')) || [];
        let currentArt = null;

        async function init() {
            const res = await fetch('data.json');
            allArticles = await res.json();
            renderFeed(allArticles.sort((a,b) => b.id - a.id));
            document.getElementById('ticker').innerHTML = allArticles.map(a => ` • ${a.title} `).join(' — ');
        }

        function renderFeed(data) {
            document.getElementById('feed').innerHTML = data.map(a => `
                <div class="card" onclick='openModal(${JSON.stringify(a).replace(/'/g, "&apos;")})'>
                    <img src="${a.img}" class="card-img">
                    <div class="card-body">
                        <h2 class="card-title">${a.title}</h2>
                        <div style="font-size: 0.7rem; color: var(--accent);">${a.cat}</div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(a) {
            currentArt = a;
            document.getElementById('m-img').src = a.img;
            document.getElementById('m-title').innerText = a.title;
            document.getElementById('m-body').innerText = a.body;
            document.getElementById('m-ai').innerHTML = `<strong>✨ Ringkasan AI:</strong> ${a.body.split('. ').slice(0,2).join('. ')}...`;
            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.body.style.overflow = 'auto';
            window.speechSynthesis.cancel();
        }

        function speak() {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(currentArt.title + ". " + currentArt.body);
            utter.lang = 'id-ID';
            window.speechSynthesis.speak(utter);
        }

        function share(p) {
            const u = window.location.href;
            const t = encodeURIComponent(currentArt.title);
            if(p === 'wa') window.open(`https://api.whatsapp.com/send?text=${t} ${u}`);
            if(p === 'x') window.open(`https://twitter.com/intent/tweet?text=${t}&url=${u}`);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        function saveArticle() {
            if(!savedArticles.some(x => x.id === currentArt.id)) {
                savedArticles.push(currentArt);
                localStorage.setItem('nn_saved', JSON.stringify(savedArticles));
                alert("Tersimpan!");
            }
        }

        function showSaved() {
            const t = document.getElementById('view-title');
            if(t.innerText === "Bookmark Saya") {
                renderFeed(allArticles);
                t.innerText = "April 2026: Berita Terkini";
            } else {
                renderFeed(savedArticles);
                t.innerText = "Bookmark Saya";
            }
        }

        init();
    </script>
</body>
</html>
