<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LOGIC | Futuristic Tech 2026</title>
    <meta name="description" content="Latest tech innovation hub with neural synchronization.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

    <style>
        /* Kritis CSS: Masukkan hanya yang diperlukan untuk tampilan layar pertama (Above the Fold) */
        :root {
            --accent: #00ff88; --bg: #050509; --card: rgba(17, 17, 24, 0.8);
            --text: #f8fafc; --muted: #8892b0;
            --gradient: linear-gradient(135deg, #00ff88 0%, #0072ff 100%);
            --border-glass: 1px solid rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif; 
            overflow-x: hidden; min-height: 100vh;
            content-visibility: auto; /* Optimasi rendering browser */
        }

        nav { position: sticky; top: 0; z-index: 100; padding: 12px 6%; background: rgba(5, 5, 9, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: var(--border-glass); height: 60px; }
        .logo { font-family: 'Space Grotesk'; font-weight: 700; color: var(--text); text-decoration: none; font-size: 1.1rem; display: flex; align-items: center; }
        .logo-box { padding: 4px 10px; background: var(--gradient); color: #000; border-radius: 8px; margin-right: 8px; }

        .hero { padding: 30px 6% 10px; text-align: center; min-height: 150px; }
        .hero h1 { font-family: 'Space Grotesk'; font-size: clamp(2.2rem, 8vw, 3.5rem); background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }

        /* Optimasi Grid: Gunakan aspect-ratio untuk mencegah CLS */
        #feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px 6% 80px; }
        .card { background: var(--card); border-radius: 24px; overflow: hidden; border: var(--border-glass); position: relative; contain: layout; }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #111; aspect-ratio: 16/9; }
        
        /* Sembunyikan bagian non-kritis awal */
        .tabs { display: flex; justify-content: center; gap: 8px; margin: 20px 0; padding: 0 6%; flex-wrap: wrap; }
        .tab-btn { background: var(--card); border: var(--border-glass); color: var(--muted); padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; }
        .tab-btn.active { background: var(--accent); color: #000; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; z-index: 1000; backdrop-filter: blur(12px); }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 10px 25px; border-radius: 50px; display: none; }
        
        /* Progress Bar (Gunakan transform daripada width untuk performa 60fps) */
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--gradient); width: 100%; z-index: 1001; transform: scaleX(0); transform-origin: left; transition: transform 0.1s linear; }
    </style>
</head>
<body>

<div id="progress-bar"></div>
<div id="toast" class="toast">Prompt Copied!</div>

<nav>
    <a href="/" class="logo"><span class="logo-box">NL</span>NEURAL LOGIC</a>
    <a href="https://saweria.co/akashiro" target="_blank" rel="noopener" style="text-decoration:none">
        <div style="background: #faae2b; color: #000; padding: 8px 16px; border-radius: 10px; font-weight: 700; font-size: 0.85rem;">Support ☕</div>
    </a>
</nav>

<header class="hero">
    <h1>Neural Logic</h1>
</header>

<div class="tabs" id="tabContainer">
    <button class="tab-btn active" onclick="filterTab('ALL', this)">All</button>
</div>

<div class="search-container" style="padding: 0 6%; margin-bottom: 20px;">
    <input type="text" id="searchInput" placeholder="Search trends..." aria-label="Search">
</div>

<main id="feed"></main>

<script>
    let allData = [];
    let currentFilter = 'ALL';

    // Gunakan DOMContentLoaded agar script tidak memblokir parsing HTML
    document.addEventListener('DOMContentLoaded', () => {
        init();
    });

    async function init() {
        try {
            const res = await fetch('data.json');
            const rawData = await res.json();
            allData = [...rawData].reverse();
            generateDynamicTabs();
            renderFeed(allData);
        } catch (e) {
            console.error("Fetch error");
        }
    }

    function renderFeed(data) {
        const feed = document.getElementById('feed');
        // Gunakan fragmen atau join untuk manipulasi DOM tunggal
        feed.innerHTML = data.map((a, index) => `
            <article class="card" onclick="openModalById(${a.id})">
                <img src="${a.img}" 
                     loading="${index < 3 ? 'eager' : 'lazy'}" 
                     width="400" height="180" 
                     class="card-img" alt="${a.title}">
                <div class="card-content" style="padding:20px;">
                    <small style="color:var(--accent); font-weight:600; text-transform:uppercase; font-size:0.7rem;">${a.cat}</small>
                    <h3 style="font-size:1.1rem; line-height:1.3; margin-top:5px;">${a.title}</h3>
                </div>
            </article>
        `).join('');
    }

    // Fungsi lainnya tetap sama, namun pastikan menggunakan requestAnimationFrame untuk animasi jika ada
    function filterTab(cat, btnElement) {
        currentFilter = cat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btnElement.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.filter(a => (currentFilter === 'ALL' || a.cat === currentFilter) && a.title.toLowerCase().includes(term));
        renderFeed(filtered);
    }

    function generateDynamicTabs() {
        const tabContainer = document.getElementById('tabContainer');
        const categories = [...new Set(allData.map(item => item.cat))];
        categories.forEach(cat => {
            if (cat) {
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.innerText = cat;
                btn.onclick = (e) => filterTab(cat, e.target);
                tabContainer.appendChild(btn);
            }
        });
    }

    // Optimasi Scroll Progress Bar dengan Transform
    window.addEventListener('scroll', () => {
        const winScroll = document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = winScroll / height;
        document.getElementById("progress-bar").style.transform = `scaleX(${scrolled})`;
    }, { passive: true }); // Passive listener untuk performa scroll mobile

    // ... sisanya fungsi modal Anda ...
</script>
</body>
</html>
