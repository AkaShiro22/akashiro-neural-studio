<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LOGIC | Tech Innovation</title>
    <meta name="description" content="Futuristic platform for 2026 gadget trends and digital aesthetics.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

    <style>
        :root {
            --accent: #00ff88; --bg: #050509; --card: rgba(17, 17, 24, 0.6);
            --text: #f8fafc; --muted: #8892b0; --glass-blur: blur(20px);
            --gradient: linear-gradient(135deg, #00ff88 0%, #0072ff 100%);
            --border-glass: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* 3. CRITICAL CSS: Menghapus beban GPU di Mobile untuk meningkatkan skor */
        @media (max-width: 768px) {
            :root { --glass-blur: none; }
            .card, .status-console { backdrop-filter: none !important; background: #111118; }
            .hero h1 { font-size: 2.5rem; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; line-height: 1.5; }
        
        nav { position: sticky; top: 0; z-index: 100; padding: 15px 6%; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: var(--border-glass); }
        .logo { font-family: 'Space Grotesk'; font-weight: 700; color: var(--text); text-decoration: none; font-size: 1.2rem; }
        .logo-box { padding: 4px 10px; background: var(--gradient); color: #000; border-radius: 8px; margin-right: 5px; }

        .hero { padding: 40px 6% 20px; text-align: center; }
        .hero h1 { font-family: 'Space Grotesk'; font-size: 3rem; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .status-console { display: flex; justify-content: center; gap: 15px; margin: 20px auto; flex-wrap: wrap; font-size: 0.8rem; }
        .accent-text { color: var(--accent); }

        #feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 0 6% 40px; }
        .card { background: var(--card); border-radius: 20px; overflow: hidden; border: var(--border-glass); transition: 0.3s; }
        .card-img { width: 100%; height: 200px; object-fit: cover; background: #1a1a24; }
        .card-content { padding: 20px; }

        /* Modal & FAB tetap ada namun dengan CSS yang lebih ringan */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 1000; padding: 20px; overflow-y: auto; }
        .m-content { background: #0a0a0f; max-width: 600px; margin: 20px auto; border-radius: 25px; padding: 25px; border: var(--border-glass); }
        .fab-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .fab { width: 50px; height: 50px; border-radius: 15px; background: var(--card); border: 1px solid var(--accent); color: var(--accent); cursor: pointer; display: grid; place-items: center; }
        
        .share-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 15px; }
        .share-btn { padding: 8px 12px; border-radius: 8px; border: var(--border-glass); background: #1a1a24; color: #fff; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo"><span class="logo-box">NL</span>NEURAL LOGIC</a>
    <div id="google_translate_element"></div>
</nav>

<header class="hero">
    <h1>Neural Logic</h1>
    <div class="status-console">
        <span class="accent-text">UPTIME: <span id="uptime-val">00:00:00</span></span>
        <span class="accent-text">PING: <span id="ping-val">-- ms</span></span>
    </nav>
</header>

<main id="feed">
    </main>

<div class="fab-container">
    <button class="fab" onclick="window.scrollTo({top:0, behavior:'smooth'})">▲</button>
</div>

<div id="modal" class="modal" onclick="this.style.display='none'">
    <div class="m-content" onclick="event.stopPropagation()">
        <img id="m-img" src="" alt="" style="width:100%; border-radius: 15px; margin-bottom: 15px;">
        <h2 id="m-title" style="margin-bottom: 10px; font-family: 'Space Grotesk';"></h2>
        <p id="m-body" style="color: var(--muted); margin-bottom: 20px;"></p>
        
        <div style="display: flex; gap: 10px;">
            <button onclick="speak()" style="background: var(--accent); color:#000; padding:10px 20px; border:none; border-radius:8px; font-weight:700; cursor:pointer;">🔊 Audio</button>
            <button onclick="this.parentElement.parentElement.parentElement.style.display='none'" style="background:#333; color:#fff; padding:10px 20px; border:none; border-radius:8px; cursor:pointer;">Close</button>
        </div>

        <div class="share-grid">
            <button class="share-btn" onclick="shareTo('whatsapp')">WhatsApp</button>
            <button class="share-btn" onclick="shareTo('x')">X (Twitter)</button>
            <button class="share-btn" onclick="shareTo('native')">Copy Link</button>
        </div>
    </div>
</div>

<script>
    let allData = [];
    let currentArt = null;

    // 4. OPTIMASI TBT: Memuat Google Translate hanya setelah user berinteraksi atau setelah 4 detik
    window.addEventListener('load', () => {
        setTimeout(() => {
            const s = document.createElement('script');
            s.src = "//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
            document.body.appendChild(s);
        }, 4000);
    });

    function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
    }

    // 5. OPTIMASI LCP: Memuat data tanpa delay buatan
    async function init() {
        try {
            const res = await fetch('data.json');
            allData = await res.json();
            renderFeed(allData);
        } catch (e) { console.error("Load failed"); }
    }

    function renderFeed(data) {
        const feed = document.getElementById('feed');
        // 6. OPTIMASI IMAGE: Menggunakan loading="lazy" untuk gambar di bawah lipatan
        feed.innerHTML = data.map((a, index) => `
            <article class="card" onclick='openModal(${index})'>
                <img src="${a.img}" loading="${index < 2 ? 'eager' : 'lazy'}" alt="${a.title}" class="card-img">
                <div class="card-content">
                    <h3 style="font-size: 1.1rem;">${a.title}</h3>
                </div>
            </article>
        `).join('');
    }

    function openModal(index) {
        currentArt = allData[index];
        document.getElementById('m-img').src = currentArt.img;
        document.getElementById('m-title').innerText = currentArt.title;
        document.getElementById('m-body').innerText = currentArt.body;
        document.getElementById('modal').style.display = 'block';
    }

    // FITUR AUDIO (Tetap Ada)
    function speak() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(currentArt.title + ". " + currentArt.body);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    // FITUR SHARE (Tetap Ada)
    function shareTo(p) {
        const url = window.location.href;
        if (p === 'whatsapp') window.open(`https://wa.me/?text=${encodeURIComponent(currentArt.title + " " + url)}`);
        else if (p === 'native') navigator.clipboard.writeText(url).then(() => alert("Copied!"));
    }

    // Statistik ringan
    setInterval(() => {
        document.getElementById('ping-val').innerText = Math.floor(Math.random() * 40) + 10 + " ms";
    }, 5000);

    init();
</script>
</body>
</html>
