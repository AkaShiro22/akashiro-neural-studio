<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LOGIC | 2026 Tech Sentinel</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff88; --bg: #050507; --card: #111116; --text: #e2e8f0; --muted: #8892b0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }

        /* --- LOGO VEKTOR MODERN --- */
        nav {
            padding: 15px 5%; background: rgba(5, 5, 7, 0.85); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo-wrap { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-glyph {
            width: 40px; height: 40px; background: #000; border: 2px solid var(--accent);
            border-radius: 10px; display: grid; place-items: center;
            font-family: 'Space Grotesk'; font-weight: 700; color: var(--accent); font-size: 1.5rem;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }
        .logo-txt { font-family: 'Space Grotesk'; font-size: 1.4rem; color: #fff; letter-spacing: 1px; }

        /* --- GRID UI --- */
        .container { max-width: 1250px; margin: 30px auto; padding: 0 5%; }
        #article-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }

        .post {
            background: var(--card); border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; position: relative;
        }
        .post:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .post-img { width: 100%; height: 180px; object-fit: cover; filter: grayscale(30%); transition: 0.4s; }
        .post:hover .post-img { filter: grayscale(0%); transform: scale(1.05); }

        .post-info { padding: 25px; }
        .post-tag { font-size: 0.65rem; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .post-title { font-family: 'Space Grotesk'; font-size: 1.25rem; color: #fff; margin: 12px 0; line-height: 1.2; }

        /* --- MODAL & AUDIO READER --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); display: none; z-index: 2000; padding: 20px; }
        .m-content { 
            background: var(--card); max-width: 800px; margin: auto; border-radius: 25px; 
            padding: 40px; border: 1px solid rgba(0, 255, 136, 0.2); position: relative;
            max-height: 90vh; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        .audio-bar {
            display: flex; gap: 10px; margin-bottom: 25px; background: rgba(0, 255, 136, 0.05);
            padding: 15px; border-radius: 12px; border: 1px dashed var(--accent);
        }
        .btn-audio { 
            background: var(--accent); color: #000; border: none; padding: 10px 20px; 
            border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-audio:active { transform: scale(0.95); }
        .close-m { position: absolute; top: 20px; right: 25px; font-size: 2rem; color: #fff; cursor: pointer; }

        /* Mobile Adjust */
        @media (max-width: 600px) { .m-content { padding: 20px; } .logo-txt { display: none; } }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo-wrap">
            <div class="logo-glyph">N</div>
            <div class="logo-txt">NEURAL LOGIC</div>
        </a>
        <div style="font-size: 0.7rem; color: var(--accent); font-family: monospace;">SYSTEM: v10.0-LIVE</div>
    </nav>

    <div class="container">
        <div id="article-grid"></div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="m-content" onclick="event.stopPropagation()">
            <span class="close-m" onclick="closeModal()">&times;</span>
            <div class="audio-bar">
                <button class="btn-audio" onclick="playAudio()">🔊 Putar Suara</button>
                <button class="btn-audio" style="background: transparent; border: 1px solid var(--accent); color: var(--accent);" onclick="stopAudio()">⏹ Berhenti</button>
            </div>
            <img id="m-img" style="width:100%; border-radius:15px; margin-bottom:25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <h1 id="m-title" style="font-family: 'Space Grotesk'; color: #fff; font-size: 2rem; margin-bottom: 20px;"></h1>
            <p id="m-body" style="font-size: 1.15rem; color: var(--muted); line-height: 1.8;"></p>
        </div>
    </div>

    <script>
        let synth = window.speechSynthesis;
        let utter = null;

        async function init() {
            const res = await fetch('data.json');
            const data = await res.json();
            // Urutkan dari ID terbesar (terbaru)
            data.sort((a, b) => b.id - a.id);
            
            document.getElementById('article-grid').innerHTML = data.map(a => `
                <div class="post" onclick='showModal(${JSON.stringify(a).replace(/'/g, "&apos;")})'>
                    <img src="${a.img}" class="post-img" loading="lazy">
                    <div class="post-info">
                        <span class="post-tag">${a.cat}</span>
                        <h2 class="post-title">${a.title}</h2>
                    </div>
                </div>
            `).join('');
        }

        function showModal(a) {
            document.getElementById('m-img').src = a.img;
            document.getElementById('m-title').innerText = a.title;
            document.getElementById('m-body').innerText = a.body;
            document.getElementById('modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.body.style.overflow = 'auto';
            stopAudio();
        }

        function playAudio() {
            stopAudio();
            const text = document.getElementById('m-title').innerText + ". " + document.getElementById('m-body').innerText;
            utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'id-ID';
            utter.rate = 1.1; // Sedikit lebih cepat agar profesional
            synth.speak(utter);
        }

        function stopAudio() {
            synth.cancel();
        }

        init();
    </script>
</body>
</html>
