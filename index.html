<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LOGIC | Official Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <style>
        :root {
            --accent: #00ff88;
            --bg: #050509; 
            --card: rgba(17, 17, 24, 0.6); 
            --text: #f8fafc;
            --muted: #8892b0;
            --glass-blur: blur(20px);
            --gradient: linear-gradient(135deg, #00ff88 0%, #0072ff 100%);
            --border-glass: 1px solid rgba(255, 255, 255, 0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; top: 0 !important; }

        /* --- FLOATING SHARE BAR (KIRI LAYAR) --- */
        .share-sidebar {
            position: fixed; left: 15px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 12px; z-index: 5000;
        }
        .share-item {
            width: 48px; height: 48px; border-radius: 14px; display: grid; place-items: center;
            text-decoration: none; color: white; font-size: 0.8rem; font-weight: 800;
            backdrop-filter: var(--glass-blur); border: 1px solid rgba(255,255,255,0.1); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .share-item:hover { transform: scale(1.2) translateX(10px); border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }
        
        .sh-fb { background: #1877f2; }
        .sh-x { background: #000; }
        .sh-wa { background: #25d366; }
        .sh-tg { background: #229ED9; }
        .sh-copy { background: var(--gradient); color: #000; cursor: pointer; }

        @media (max-width: 768px) {
            .share-sidebar { 
                left: 0; top: auto; bottom: 0; width: 100%; 
                flex-direction: row; justify-content: space-around; 
                background: var(--card); padding: 10px; transform: none;
                border-top: var(--border-glass); backdrop-filter: var(--glass-blur);
            }
            .share-item:hover { transform: translateY(-5px); }
        }

        /* --- UI COMPONENTS --- */
        nav {
            position: sticky; top: 0; z-index: 2000; padding: 15px 6%;
            background: var(--card); backdrop-filter: var(--glass-blur);
            border-bottom: var(--border-glass); display: flex; justify-content: space-between; align-items: center;
        }
        .logo-box { padding: 5px 12px; background: var(--gradient); color: #000; border-radius: 10px; font-weight: bold; }
        
        .status-bar {
            background: rgba(0, 255, 136, 0.05); border-bottom: var(--border-glass);
            padding: 10px 6%; display: flex; gap: 20px; font-size: 0.7rem; font-family: 'Space Grotesk';
            color: var(--muted); text-transform: uppercase;
        }
        .dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 6% 100px; }
        #feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { 
            background: var(--card); border-radius: 28px; overflow: hidden; border: var(--border-glass); 
            cursor: pointer; backdrop-filter: var(--glass-blur);
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .card-img { width: 100%; height: 220px; object-fit: cover; }
        .card-content { padding: 25px; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 6000; padding: 20px; overflow-y: auto; backdrop-filter: blur(15px); }
        .m-content { background: var(--card); max-width: 800px; margin: 30px auto; border-radius: 35px; padding: 40px; border: var(--border-glass); position: relative; }
        .close { position: absolute; top: 20px; right: 25px; font-size: 2.5rem; cursor: pointer; color: var(--muted); }

        .fab-container { position: fixed; bottom: 85px; right: 25px; display: flex; flex-direction: column; gap: 15px; z-index: 4000; }
        .fab { width: 55px; height: 55px; border-radius: 18px; background: var(--card); border: 1px solid var(--accent); color: var(--accent); cursor: pointer; display: grid; place-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

<div class="share-sidebar">
    <a href="https://www.facebook.com/sharer/sharer.php?u=https://AkaShiro22.github.io" target="_blank" class="share-item sh-fb">FB</a>
    <a href="https://twitter.com/intent/tweet?url=https://AkaShiro22.github.io" target="_blank" class="share-item sh-x">X</a>
    <a href="https://api.whatsapp.com/send?text=Cek website IPTEK masa depan: https://AkaShiro22.github.io" target="_blank" class="share-item sh-wa">WA</a>
    <a href="https://t.me/share/url?url=https://AkaShiro22.github.io" target="_blank" class="share-item sh-tg">TG</a>
    <div onclick="copyLink()" class="share-item sh-copy">🔗</div>
</div>

<nav>
    <div style="display:flex; align-items:center; gap:10px;">
        <span class="logo-box">NL</span>
        <h2 style="font-family:'Space Grotesk'">NEURAL LOGIC</h2>
    </div>
    <div id="google_translate_element"></div>
</nav>

<div class="status-bar">
    <div style="display:flex; align-items:center; gap:8px;">
        <div class="dot"></div> System: <span style="color:var(--accent)">Online</span>
    </div>
    <div>Uptime: <span id="timer">00:00:00</span></div>
    <div>Ping: <span id="ping">24</span>ms</div>
</div>

<div class="container">
    <div id="feed">
        </div>
</div>

<div class="fab-container">
    <button class="fab" onclick="window.open('https://trakteer.id/AkaShiro22','_blank')">☕</button>
    <button class="fab" onclick="window.scrollTo({top:0, behavior:'smooth'})">▲</button>
</div>

<div id="modal" class="modal" onclick="closeModal()">
    <div class="m-content" onclick="event.stopPropagation()">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="m-img" style="width:100%; border-radius: 25px; margin-bottom: 25px;">
        <h2 id="m-title" style="margin-bottom: 15px; font-family:'Space Grotesk'"></h2>
        <div id="m-body" style="color:var(--muted); line-height:1.8; margin-bottom: 30px;"></div>
        
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button onclick="speak()" style="background:var(--accent); padding:12px 25px; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">🔊 Audio</button>
            <button onclick="copyLink()" style="background:white; padding:12px 25px; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">🔗 Salin Link</button>
        </div>
    </div>
</div>

<script>
    let allData = [];
    let start = Date.now();

    async function init() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            allData = await res.json();
            display(allData.sort((a,b) => b.id - a.id));
            
            // Start Timers
            setInterval(() => {
                const d = new Date(Date.now() - start);
                document.getElementById('timer').innerText = d.toISOString().substr(11, 8);
                document.getElementById('ping').innerText = Math.floor(Math.random() * 10 + 20);
            }, 1000);
        } catch (e) { console.error("Gagal muat data."); }
    }

    function display(data) {
        document.getElementById('feed').innerHTML = data.map(a => `
            <div class="card" onclick='openModal(${JSON.stringify(a)})'>
                <img src="${a.img}" class="card-img">
                <div class="card-content">
                    <small style="color:var(--accent)">${a.cat}</small>
                    <h3 style="margin-top:8px">${a.title}</h3>
                </div>
            </div>
        `).join('');
    }

    let currentArt;
    function openModal(a) {
        currentArt = a;
        document.getElementById('m-img').src = a.img;
        document.getElementById('m-title').innerText = a.title;
        document.getElementById('m-body').innerText = a.body;
        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
        window.speechSynthesis.cancel();
    }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href);
        alert("✅ Link Berhasil Disalin!");
    }

    function speak() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(currentArt.body);
        msg.lang = 'id-ID';
        window.speechSynthesis.speak(msg);
    }

    function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'id'}, 'google_translate_element');
    }

    init();
</script>

</body>
</html>
