<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Logic | Portal IPTEK 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #0a0b10;
            --card-bg: #161821;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            padding: 2rem;
            text-align: center;
            background: linear-gradient(180deg, #161821 0%, transparent 100%);
        }

        h1 {
            color: var(--primary);
            letter-spacing: 2px;
            margin: 0;
        }

        .filter-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 1rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            color: var(--bg);
        }

        #news-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
            border: 1px solid #252836;
        }

        .card:hover { transform: translateY(-5px); }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content { padding: 15px; }

        .category {
            font-size: 0.7rem;
            color: var(--primary);
            font-weight: bold;
            text-transform: uppercase;
        }

        .audio-btn {
            background: #252836;
            border: none;
            color: white;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            float: right;
        }

        /* Skeleton Loading */
        .skeleton {
            background: #252836;
            height: 200px;
            width: 100%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 0.8; }
            100% { opacity: 0.5; }
        }

        /* Toast Notification */
        #notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: var(--bg);
            padding: 15px 25px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,242,255,0.3);
        }
    </style>
</head>
<body>

<header>
    <h1>NEURAL LOGIC</h1>
    <p>Intelligence Beyond Human Perception</p>
</header>

<div class="filter-container" id="filter-container">
    <button class="filter-btn active" onclick="filterData('ALL')">ALL</button>
    <button class="filter-btn" onclick="filterData('AUTOMOTIVE')">AUTOMOTIVE</button>
    <button class="filter-btn" onclick="filterData('AI')">AI</button>
    <button class="filter-btn" onclick="filterData('MILITER')">MILITER</button>
</div>

<div id="news-container">
    <div class="card"><div class="skeleton"></div></div>
    <div class="card"><div class="skeleton"></div></div>
    <div class="card"><div class="skeleton"></div></div>
</div>

<div id="notification">🚀 Update Artikel Terbaru Tersedia!</div>

<script>
    let allArticles = [];

    async function loadNews() {
        try {
            // Menambahkan timestamp agar browser tidak mengambil cache lama
            const response = await fetch('data.json?t=' + new Date().getTime());
            const data = await response.json();
            allArticles = data;
            
            checkNewUpdate(data);
            displayNews(data);
        } catch (error) {
            console.error("Gagal memuat data:", error);
            document.getElementById('news-container').innerHTML = "<p>Gagal memuat berita. Periksa file data.json Anda.</p>";
        }
    }

    function displayNews(articles) {
        const container = document.getElementById('news-container');
        container.innerHTML = "";

        articles.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${item.img}" alt="${item.title}" loading="lazy">
                <div class="card-content">
                    <button class="audio-btn" onclick="speak('${item.body.replace(/'/g, "\\'")}')">🔊</button>
                    <span class="category">${item.cat}</span>
                    <h3>${item.title}</h3>
                    <p style="font-size: 0.9rem; line-height: 1.6;">${item.body}</p>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function filterData(category) {
        // Update active button
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText === category) btn.classList.add('active');
        });

        if (category === 'ALL') {
            displayNews(allArticles);
        } else {
            const filtered = allArticles.filter(a => a.cat === category);
            displayNews(filtered);
        }
    }

    function speak(text) {
        // Fitur Audio Reading
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'id-ID';
        window.speechSynthesis.speak(utterance);
    }

    function checkNewUpdate(data) {
        const lastId = localStorage.getItem('lastId');
        const currentId = data[0].id;

        if (lastId && currentId > lastId) {
            const toast = document.getElementById('notification');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 5000);
        }
        localStorage.setItem('lastId', currentId);
    }

    // Jalankan saat halaman dibuka
    loadNews();
</script>

</body>
</html>
