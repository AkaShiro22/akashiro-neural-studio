<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#08080a">
    <link rel="manifest" href="manifest.json">
    
    <title>NEURAL LOGIC v6.0 | Platinum Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00ff88;
            --bg-dark: #08080a;
            --card-bg: rgba(18, 18, 23, 0.8);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --nav-bg: rgba(8, 8, 10, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s; }
        body { background: var(--bg-dark); font-family: 'Inter', sans-serif; color: var(--text-main); min-height: 100vh; }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: var(--nav-bg); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* --- LOGO PROFESIONAL (CSS BASED) --- */
        .logo-group { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon {
            width: 35px; height: 35px; background: #000; border-radius: 8px;
            border: 2px solid var(--accent); display: grid; place-items: center;
            font-family: 'Space Grotesk'; font-weight: 700; color: var(--accent); font-size: 1.2rem;
            box-shadow: 0 0 10px rgba(0,255,136,0.3);
        }
        .logo-text { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 700; color: #fff; letter-spacing: 1px; }

        .search-box {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 15px; border-radius: 30px; color: #fff; outline: none; width: 180px;
        }

        /* Layout */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 5%; display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 900px) { .container { grid-template-columns: 2.5fr 1fr; } aside { position: sticky; top: 90px; height: fit-content; } }

        /* --- TAMPILAN KARTU BARU DENGAN GAMBAR --- */
        #feed { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { #feed { grid-template-columns: repeat(2, 1fr); } } /* Responsive Grid HP/PC */

        .post-card {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.03);
            overflow: hidden; cursor: pointer; display: flex; flex-direction: column;
        }
        .post-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,255,136,0.1); }
        
        /* Gambar Kartu */
        .post-img { width: 100%; height: 160px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .post-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .post-tag { color: var(--accent); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .post-title { font-size: 1.1rem; margin: 8px 0; color: #fff; line-height: 1.3; font-family: 'Space Grotesk'; }
        
        .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 0.65rem; background: var(--accent); color: #000; margin-top: 10px; width: fit-content;}

        /* Widget */
        .widget { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.03); margin-bottom: 20px; }
        .widget h3 { font-size: 0.8rem; color: var(--accent); margin-bottom: 15px; text-transform: uppercase; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 2000; padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: #121217; max-width: 700px; margin: 40px auto; padding: 30px; border-radius: 20px; border: 1px solid var(--accent); position: relative; max-height: 80vh; overflow-y: auto; color: #e2e8f0; }
        .close { position: absolute; top: 20px; right: 25px; font-size: 2rem; cursor: pointer; color: #fff; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo-group">
            <div class="logo-icon">N</div>
            <div class="logo-text">NEURAL LOGIC</div>
        </a>
        <input type="text" id="searchInput" class="search-box" placeholder="Cari..." onkeyup="search()">
    </nav>

    <div class="container">
        <main id="feed"></main>
        <aside>
            <div class="widget" style="background: linear-gradient(135deg, #00ff8811, transparent);">
                <h3>Portal Status</h3>
                <p style="font-size: 0.75rem; font-family: monospace; color: var(--accent);">
                    [●] DB: 50 Records<br>
                    [●] UI: Platinum v6.0<br>
                    [●] Mode: Secure
                </p>
            </div>
        </aside>
    </div>

    <div class="modal" id="myModal">
        <div class="modal-content">
            <span class="close" onclick="closeM()">&times;</span>
            <img id="mImg" src="" style="width:100%; height:200px; object-fit:cover; border-radius:12px; margin-bottom:20px;">
            <span id="mTag" class="post-tag"></span>
            <h1 id="mTitle" style="margin: 10px 0 20px 0; font-family: 'Space Grotesk'; color: #fff;"></h1>
            <div id="mBody" style="line-height: 1.8; font-size: 1rem;"></div>
            <hr style="margin: 25px 0; opacity: 0.1;">
            <button class="btn" onclick="speak()">🔊 Baca Berita</button>
            <button class="btn" style="background:#ff4444; color:#fff; margin-left:10px;" onclick="stop()">⏹ Berhenti</button>
        </div>
    </div>

    <script>
        let db = [];

        async function load() {
            try {
                const res = await fetch('data.json');
                db = await res.json();
                render(db.sort((a,b) => b.id - a.id));
            } catch (e) { document.getElementById('feed').innerHTML = "Database Error."; }
        }

        // --- UPDATE RENDER: Menampilkan Gambar ---
        function render(data) {
            const f = document.getElementById('feed');
            f.innerHTML = data.map(a => `
                <div class="post-card" onclick='openM(${JSON.stringify(a).replace(/'/g, "&apos;")})'>
                    <img src="${a.img}" class="post-img" alt="Visual IPTEK">
                    <div class="post-content">
                        <div>
                            <span class="post-tag">${a.cat}</span>
                            <h2 class="post-title">${a.title}</h2>
                        </div>
                        <button class="btn">Baca</button>
                    </div>
                </div>
            `).join('');
        }

        function search() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            render(db.filter(a => a.title.toLowerCase().includes(q) || a.cat.toLowerCase().includes(q)));
        }

        function openM(a) {
            document.getElementById('mImg').src = a.img; // Update Gambar Modal
            document.getElementById('mTag').innerText = a.cat;
            document.getElementById('mTitle').innerText = a.title;
            document.getElementById('mBody').innerText = a.body;
            document.getElementById('myModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeM() { 
            document.getElementById('myModal').style.display = 'none'; 
            document.body.style.overflow = 'auto';
            window.speechSynthesis.cancel();
        }

        function speak() {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(document.getElementById('mTitle').innerText + ". " + document.getElementById('mBody').innerText);
            msg.lang = 'id-ID';
            window.speechSynthesis.speak(msg);
        }

        function stop() { window.speechSynthesis.cancel(); }

        load();
    </script>
</body>
</html>
